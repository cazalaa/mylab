<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/xterm.min.css">
<script src="/static/xterm.min.js"></script>
<script src="/static/socket.io.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: #EFF2F9;
    color: #4a5a68;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ── header ── */
.term-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: #EFF2F9;
    flex-shrink: 0;
}
.term-serial {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: #4a5a68;
}
.term-label { font-size: 11px; color: #8899aa; }
.term-host {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #1D9E75;
    margin-left: auto;
}

/* ── tabs ── */
.term-tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 0 16px 10px;
    background: #EFF2F9;
    flex-shrink: 0;
}
.term-tab {
    padding: 6px 20px;
    font-size: 12px;
    font-weight: 500;
    color: #6E7F8D;
    cursor: pointer;
    border-radius: 10px;
    border: none;
    background: #EFF2F9;
    transition: box-shadow .2s, color .2s;
    user-select: none;
    box-shadow:
        -4px -4px 8px rgba(250, 251, 255, 1),
         4px  4px 8px rgba(22, 27, 29, 0.23);
}
.term-tab:hover { color: #4a5a68; }
.term-tab.active {
    color: #4a5a68;
    box-shadow:
        inset -4px -4px 8px rgba(250, 251, 255, 1),
        inset  4px  4px 8px rgba(22, 27, 29, 0.23);
}

.term-tab-status {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #b5bfc6;
    margin-right: 6px;
    vertical-align: middle;
}
.term-tab-status.connected  { background: #1D9E75; }
.term-tab-status.error      { background: #E24B4A; }
.term-tab-status.connecting { background: #EF9F27; }

/* ── terminal panes ── */
.term-panes {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    padding: 0 16px;
}
.term-pane {
    flex: 1;
    display: none;
    min-height: 0;
    /* wrapper: rounded corners + neumorphic shadow + padding */
    border-radius: 14px;
    box-shadow:
        inset -4px -4px 8px rgba(250, 251, 255, 1),
        inset  4px  4px 8px rgba(22, 27, 29, 0.18);
    overflow: hidden;
    padding: 8px 0 8px;
    background: #1a1a1a;
    box-sizing: border-box;
}
.term-pane.active { display: flex; flex-direction: column; }

/* xterm fills the padded inner area exactly */
.term-pane .xterm          { flex: 1; min-height: 0; overflow: hidden; }
.term-pane .xterm-viewport { overflow-y: scroll !important; }

/* scrollbar */
.term-pane .xterm-viewport::-webkit-scrollbar       { width: 6px; }
.term-pane .xterm-viewport::-webkit-scrollbar-track { background: transparent; }
.term-pane .xterm-viewport::-webkit-scrollbar-thumb { background: #b5bfc6; border-radius: 3px; }
.term-pane .xterm-viewport::-webkit-scrollbar-thumb:hover { background: #6E7F8D; }


/* ── modern view ── */
.term-modern {
    flex: 1;
    min-height: 0;
    display: none;
    flex-direction: column;
    overflow-y: auto;
    padding: 12px 16px;
    background: #EFF2F9;
    gap: 2px;
}
.term-modern.active { display: flex; }
.term-modern::-webkit-scrollbar { width: 5px; }
.term-modern::-webkit-scrollbar-thumb { background: #b5bfc6; border-radius: 3px; }

/* timeline spine */
.tm-entry {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    position: relative;
}
.tm-spine {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    width: 12px;
    padding-top: 3px;
}
.tm-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 1.5px solid #8899aa;
    background: #EFF2F9;
}
.tm-line {
    width: 1.5px;
    flex: 1;
    min-height: 8px;
    background: rgba(22,27,29,0.12);
    margin-top: 3px;
}
.tm-time {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: #b5bfc6;
    flex-shrink: 0;
    width: 60px;
    padding-top: 3px;
    text-align: right;
}
.tm-block {
    flex: 1;
    min-width: 0;
    margin-bottom: 6px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow:
        -3px -3px 6px rgba(250,251,255,1),
         3px  3px 6px rgba(22,27,29,0.15);
    cursor: pointer;
    transition: box-shadow .15s;
}
.tm-block:hover {
    box-shadow:
        -3px -3px 6px rgba(250,251,255,1),
         4px  4px 8px rgba(22,27,29,0.22);
}

/* status block (connected/disconnected) */
.tm-block-status {
    padding: 5px 12px;
    font-size: 10px;
    color: #8899aa;
    font-style: italic;
    cursor: default;
    border-radius: 8px;
    background: #EFF2F9;
    box-shadow: none;
}

/* command block */
.tm-block-cmd .tm-block-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    background: #EFF2F9;
}
.tm-block-cmd .tm-icon { font-size: 10px; color: #185FA5; flex-shrink: 0; }
.tm-block-cmd .tm-summary {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #185FA5;
    font-weight: 500;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.tm-block-cmd .tm-arrow {
    font-size: 9px;
    color: #b5bfc6;
    flex-shrink: 0;
    transition: transform .2s;
}
.tm-block-cmd.expanded .tm-arrow { transform: rotate(90deg); }
.tm-block-cmd .tm-response {
    display: none;
    padding: 6px 12px 8px;
    border-top: 1px solid rgba(22,27,29,0.07);
    background: #e8ecf5;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: #4a5a68;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 300px;
    overflow-y: auto;
}
.tm-block-cmd.expanded .tm-response { display: block; }

/* event block */
.tm-block-event .tm-block-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    background: #EFF2F9;
}
.tm-block-event .tm-icon { font-size: 10px; color: #EF9F27; flex-shrink: 0; }
.tm-block-event .tm-summary {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: #6E7F8D;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.tm-block-event .tm-arrow {
    font-size: 9px;
    color: #b5bfc6;
    transition: transform .2s;
}
.tm-block-event.expanded .tm-arrow { transform: rotate(90deg); }
.tm-block-event .tm-detail {
    display: none;
    padding: 6px 12px 8px;
    border-top: 1px solid rgba(22,27,29,0.07);
    background: #fdf4e8;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: #6E7F8D;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 200px;
    overflow-y: auto;
}
.tm-block-event.expanded .tm-detail { display: block; }

/* response block — indented right */
.tm-entry-response {
    padding-left: 32px;
}
.tm-spine-resp { opacity: 0.4; }
.tm-dot-resp {
    width: 6px; height: 6px;
    border-color: #6E7F8D;
    background: #EFF2F9;
}
.tm-block-resp {
    flex: 1;
    min-width: 0;
    margin-bottom: 6px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow:
        -2px -2px 5px rgba(250,251,255,1),
         2px  2px 5px rgba(22,27,29,0.12);
    cursor: pointer;
    transition: box-shadow .15s;
}
.tm-block-resp.single { cursor: default; }
.tm-block-resp .tm-block-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: #e8ecf5;
}
.tm-icon-resp { font-size: 10px; color: #6E7F8D; flex-shrink: 0; }
.tm-resp-summary {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: #4a5a68;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.tm-block-resp.expanded .tm-arrow { transform: rotate(90deg); }
.tm-block-resp .tm-response {
    display: none;
    padding: 6px 12px 8px;
    border-top: 1px solid rgba(22,27,29,0.07);
    background: #dde3f0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: #4a5a68;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 300px;
    overflow-y: auto;
}
.tm-block-resp.expanded .tm-response { display: block; }

/* dot colors */
.tm-dot-cmd    { border-color: #185FA5; background: #EFF2F9; }
.tm-dot-event  { border-color: #EF9F27; background: #EFF2F9; }
.tm-dot-status { border-color: #1D9E75; background: #1D9E75; }

/* Timeline icon — replaces empty circle dot for group/event entries */
.tm-dot-icon {
    width: 16px; height: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; line-height: 1; flex-shrink: 0;
}

/* Group block header background by color category */
.tm-block-event.color-boot   .tm-block-header { background: #FCE7F3; }
.tm-block-event.color-script .tm-block-header { background: #DBEAFE; }
.tm-block-event.color-error  .tm-block-header { background: #FEE2E2; }
.tm-block-event.color-warning .tm-block-header { background: #FEF3C7; }
.tm-block-event.color-success .tm-block-header { background: #D1FAE5; }
.tm-block-event.color-boot   .tm-detail { background: #FDF2F8; }
.tm-block-event.color-script .tm-detail { background: #EFF6FF; }
.tm-block-event.color-error  .tm-detail { background: #FEF2F2; }

/* view toggle button */
.term-view-toggle {
    font-size: 10px;
    padding: 3px 10px;
    height: 22px;
    border-radius: 6px;
    margin-left: auto;
    cursor: pointer;
    background: #EFF2F9;
    color: #8899aa;
    border: none;
    box-shadow:
        -2px -2px 4px rgba(250,251,255,1),
         2px  2px 4px rgba(22,27,29,0.18);
    font-family: 'IBM Plex Mono', monospace;
    transition: box-shadow .15s, color .15s;
}
.term-view-toggle:hover { color: #4a5a68; }
.term-view-toggle.active {
    box-shadow:
        inset -2px -2px 4px rgba(250,251,255,1),
        inset  2px  2px 4px rgba(22,27,29,0.18);
    color: #185FA5;
}

/* ── action bar (Reset/PB/Script) ── */
.term-action-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px 8px;
    background: #EFF2F9;
    flex-shrink: 0;
}
.term-action-sep {
    width: 1px;
    height: 20px;
    background: rgba(22,27,29,0.12);
    flex-shrink: 0;
}
.term-script-name {
    flex: 1;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: #8899aa;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.term-run-btn {
    background: #1D9E75 !important;
    color: white !important;
}
.term-run-btn:disabled {
    background: #EFF2F9 !important;
    color: #b5bfc6 !important;
    opacity: 1 !important;
}
.term-action-btn {
    height: 32px;
    width: 80px;
    border-radius: 10px;
    border: none;
    background: #EFF2F9;
    color: #6E7F8D;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: box-shadow .15s, color .15s;
    box-shadow:
        -4px -4px 8px rgba(250, 251, 255, 1),
         4px  4px 8px rgba(22, 27, 29, 0.23);
}
.term-action-btn:hover  { color: #4a5a68; }
.term-action-btn:active {
    color: #4a5a68;
    box-shadow:
        inset -4px -4px 8px rgba(250, 251, 255, 1),
        inset  4px  4px 8px rgba(22, 27, 29, 0.23);
}
.term-action-btn:disabled { opacity: .4; pointer-events: none; }

/* ── input bar ── */
.term-input-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 16px 10px;
    background: #EFF2F9;
    flex-shrink: 0;
}
.term-prompt {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    color: #1D9E75;
    flex-shrink: 0;
}
.term-input {
    flex: 1;
    height: 34px;
    padding: 0 12px;
    background: #EFF2F9;
    border: none;
    border-radius: 10px;
    outline: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: #4a5a68;
    caret-color: #1D9E75;
    box-shadow:
        inset -3px -3px 6px rgba(250, 251, 255, 1),
        inset  3px  3px 6px rgba(22, 27, 29, 0.18);
}
.term-input::placeholder { color: #b5bfc6; }
.term-send-btn {
    width: 34px; height: 34px;
    padding: 0;
    border-radius: 10px;
    border: none;
    background: #EFF2F9;
    color: #6E7F8D;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: box-shadow .15s, color .15s;
    box-shadow:
        -3px -3px 6px rgba(250, 251, 255, 1),
         3px  3px 6px rgba(22, 27, 29, 0.23);
}
.term-send-btn:hover { color: #4a5a68; }
.term-send-btn:active {
    box-shadow:
        inset -3px -3px 6px rgba(250, 251, 255, 1),
        inset  3px  3px 6px rgba(22, 27, 29, 0.23);
}
</style>
</head>
<body>

<div class="term-header">
    <div>
        <div class="term-serial" id="termSerial">—</div>
        <div class="term-label"  id="termLabel">Loading…</div>
    </div>
    <div class="term-host" id="termHost">—</div>
</div>

<div class="term-tabs">
    <div class="term-tab active" id="tabVcom"  onclick="switchTab('vcom')">
        <span class="term-tab-status connecting" id="statusVcom"></span>VCOM
    </div>
    <div class="term-tab" id="tabAdmin" onclick="switchTab('admin')">
        <span class="term-tab-status connecting" id="statusAdmin"></span>ADMIN
    </div>

</div>

<div class="term-panes">
    <div class="term-pane active" id="paneVcom"></div>
    <div class="term-pane"        id="paneAdmin"></div>
    <div class="term-modern"      id="modernVcom"></div>
    <div class="term-modern"      id="modernAdmin"></div>
</div>

<div class="term-input-bar">
    <span class="term-prompt">›</span>
    <input type="text" id="termInput" class="term-input" 
           placeholder="Type command…" autocomplete="off" spellcheck="false"/>
    <button class="term-send-btn" onclick="sendCommand()">⏎</button>
</div>

<div class="term-action-bar" id="termActionBar">
    <span class="term-admin-btns" id="termAdminBtns" style="display:none; contents">
        <button class="term-action-btn" onclick="termCmd('target reset 100')">Reset</button>
        <button class="term-action-btn" onclick="termPb(1)">PB1</button>
        <button class="term-action-btn" onclick="termPb(0)">PB0</button>
        <div class="term-action-sep"></div>
    </span>
    <button class="term-action-btn" onclick="pickScript()">📁 Script</button>
    <span class="term-script-name" id="termScriptName">no script selected</span>
    <button class="term-action-btn term-run-btn" id="termRunBtn" onclick="runScript()" disabled>▶ Run</button>
</div>

<script>
const serial    = location.pathname.split("/").filter(p => p.length > 0).pop();
const socket    = io();

socket.on("connect", () => {
    console.log("socket connected:", socket.id);
});
socket.on("connect_error", (e) => {
    console.error("socket error:", e);
});
socket.on("terminal_echo", ({ data, room }) => {
    const kind = room.split("_").pop();
    terminals[kind]?.term.writeln(`\x1b[38;5;244m${data}\x1b[0m`);
});
let info        = null;
let terminals   = {};
let activeTab   = "vcom";

// ── historique des commandes ──────────────────────
const cmdHistory = [];
let historyIdx   = -1;

document.addEventListener("DOMContentLoaded", () => {
    const input = document.getElementById("termInput");
    if (!input) return;

    input.addEventListener("keydown", e => {
        if (e.key === "Enter") {
            sendCommand();
        } else if (e.key === "ArrowUp") {
            e.preventDefault();
            if (historyIdx < cmdHistory.length - 1) {
                historyIdx++;
                input.value = cmdHistory[cmdHistory.length - 1 - historyIdx];
            }
        } else if (e.key === "ArrowDown") {
            e.preventDefault();
            if (historyIdx > 0) {
                historyIdx--;
                input.value = cmdHistory[cmdHistory.length - 1 - historyIdx];
            } else {
                historyIdx = -1;
                input.value = "";
            }
        }
    });

    // Focus automatique sur l'input
    input.focus();
});

function sendCommand() {
    const input = document.getElementById("termInput");
    const cmd   = input.value;
    if (!cmd) return;

    // Ajouter à l'historique
    if (cmdHistory[cmdHistory.length - 1] !== cmd) {
        cmdHistory.push(cmd);
    }
    historyIdx = -1;

    // Envoyer au terminal actif
    const room = `${serial}_${activeTab}`;
    socket.emit("terminal_input", { room, data: cmd + "\r\n" });

    // Afficher dans xterm
    terminals[activeTab]?.term.writeln(`\x1b[90m› ${cmd}\x1b[0m`);
    mvFeed(activeTab, `> ${cmd}\n`);

    input.value = "";
    input.focus();
}

// ── init ──────────────────────────────────────────
async function init() {
    try {
        const res = await fetch(`/api/terminal-info/${serial}`);
        info = await res.json();
    } catch(e) {
        document.getElementById("termLabel").innerText = "Error: " + e.message;
        return;
    }

    if (info.error) {
        document.getElementById("termLabel").innerText = "Error: " + info.error;
        return;
    }

    document.getElementById("termSerial").innerText =
        info.serial + (info.nickname ? ` — ${info.nickname}` : "");
    document.getElementById("termLabel").innerText = info.label || "";

    if (info.tty) {
        // USB TTY — VCOM only, no ADMIN
        document.getElementById("termHost").innerText = `TTY: ${info.tty}`;
        document.getElementById("tabAdmin").style.display = "none";
        createTerminalTTY("vcom", "paneVcom", info.tty);
    } else {
        // Network (ethernet/IP)
        document.getElementById("termHost").innerText =
            `${info.host}  VCOM:${info.vcom}  ADMIN:${info.admin}`;
        createTerminal("vcom",  "paneVcom",  info.host, info.vcom);
        createTerminal("admin", "paneAdmin", info.host, info.admin);
    }
    applyView();
}


// ── terminal factory ──────────────────────────────
function termConfig() {
    return {
        fontFamily:  "'IBM Plex Mono', monospace",
        fontSize:    13,
        scrollback:  300,
        theme: {
            background: "#1a1a1a",
            foreground: "#f4f3f0",
            cursor:     "#1D9E75",
            selection:  "#ffffff33",
        },
        cursorBlink: true,
    };
}

function fitTerm(term, pane) {
    const rect = pane.getBoundingClientRect();
    const W = rect.width;
    const H = rect.height - 16; // subtract top+bottom padding (8+8)
    if (!W || !H) return;
    const core  = term._core;
    const dims  = core && core._renderService && core._renderService.dimensions;
    const charW = dims ? dims.css.cell.width  : term.options.fontSize * 0.601;
    const charH = dims ? dims.css.cell.height : term.options.fontSize * 1.5;
    if (!charW || !charH) return;
    const cols = Math.max(40, Math.floor(W / charW));
    const rows = Math.max(8,  Math.ceil(H / charH));  // ceil fills to bottom
    if (term.cols !== cols || term.rows !== rows) {
        term.resize(cols, rows);
    }
}

function attachFit(term, pane) {
    requestAnimationFrame(() => requestAnimationFrame(() => fitTerm(term, pane)));
    if (window.ResizeObserver) {
        new ResizeObserver(() => fitTerm(term, pane)).observe(pane);
    }
}

function createTerminal(kind, paneId, host, port) {
    const pane = document.getElementById(paneId);
    const term = new Terminal(termConfig());
    term.open(pane);
    terminals[kind] = { term, pane, host, port };
    attachFit(term, pane);

    const room = `${serial}_${kind}`;
    setStatus(kind, "connecting");
    term.writeln(`\x1b[33mConnecting to ${host}:${port}…\x1b[0m`);

    if (socket.connected) {
        socket.emit("connect_telnet", { room, host, port: String(port) });
    } else {
        socket.once("connect", () => socket.emit("connect_telnet", { room, host, port: String(port) }));
    }

    // For admin (no board echo): accumulate keystrokes and inject > cmd into Modern View on Enter
    var adminInputBuf = "";
    term.onData(data => {
        const out = data.replace(/\r/g, "\r\n");
        socket.emit("terminal_input", { room, data: out });
    });
}

function createTerminalTTY(kind, paneId, tty) {
    const pane = document.getElementById(paneId);
    const term = new Terminal(termConfig());
    term.open(pane);
    terminals[kind] = { term, pane };
    attachFit(term, pane);

    const room = `${serial}_${kind}`;
    setStatus(kind, "connecting");
    term.writeln(`\x1b[33mConnecting to TTY ${tty}…\x1b[0m`);

    if (socket.connected) {
        socket.emit("connect_tty", { room, tty });
    } else {
        socket.once("connect", () => socket.emit("connect_tty", { room, tty }));
    }

    term.onData(data => socket.emit("terminal_input", { room, data }));
}
// ── socket events ─────────────────────────────────
socket.on("terminal_ready", ({ room }) => {
    const kind = room.split("_").pop();
    if (terminals[kind]) terminals[kind].reconnecting = false;
    setStatus(kind, "connected");
    terminals[kind]?.term.writeln("\x1b[32mConnected.\x1b[0m");
    mvAddStatus(kind, "Connected");
});

socket.on("terminal_output", ({ data, room, groups }) => {
    const kind = room.split("_").pop();
    terminals[kind]?.term.write(data);
    // Always feed raw data to mvFeed for response/prompt detection
    // Groups provide the pretty display cache for events
    if (modernMode && groups && groups.length > 0) {
        mvGroupCache[kind] = mvGroupCache[kind] || [];
        mvGroupCache[kind].push(...groups);
    }
    mvFeed(kind, data);
});

socket.on("terminal_closed", ({ room }) => {
    const kind = room ? room.split("_").pop() : activeTab;
    terminals[kind]?.term.writeln("\x1b[31m\r\nConnection closed.\x1b[0m");
    setStatus(kind, "error");
    mvAddStatus(kind, "Connection closed");

    // Auto-reconnect admin channel
    if (kind === "admin") {
        const t = terminals["admin"];
        if (t && t.host && t.port) {
            const tryReconnect = () => {
                if (terminals["admin"]?.reconnecting !== true) return;
                t.term.writeln(`\x1b[33mReconnecting…\x1b[0m`);
                setStatus("admin", "connecting");
                socket.emit("connect_telnet", { room, host: t.host, port: String(t.port) });
            };
            terminals["admin"].reconnecting = true;
            setTimeout(tryReconnect, 2000);
        }
    }
});

socket.on("terminal_error", ({ message }) => {
    terminals[activeTab]?.term.writeln(`\x1b[31mError: ${message}\x1b[0m`);
    setStatus(activeTab, "error");
    // Retry admin reconnect if in progress
    if (activeTab === "admin" || terminals["admin"]?.reconnecting) {
        const t = terminals["admin"];
        if (t && t.host && t.port && t.reconnecting) {
            setTimeout(() => {
                if (!t.reconnecting) return;
                t.term.writeln(`\x1b[33mReconnecting…\x1b[0m`);
                setStatus("admin", "connecting");
                socket.emit("connect_telnet", { room: `${serial}_admin`, host: t.host, port: String(t.port) });
            }, 3000);
        }
    }
});

// ══════════════════════════════════════════════════════
// Modern View Engine
// ══════════════════════════════════════════════════════

// Per-channel parser state
var mvState = {
    vcom:  { pending: null, pendingQueue: [], buffer: "", lastEventEl: null },
    admin: { pending: null, pendingQueue: [], buffer: "", lastEventEl: null }
};

// Server-parsed groups cache (populated before mvFeed, matched at prompt)
var mvGroupCache = { vcom: [], admin: [] };
// RT event lines buffered until prompt, replaced by group or flushed as-is
var mvEventBuf   = { vcom: [], admin: [] };

function applyView() {
    if (modernMode) {
        document.querySelectorAll(".term-pane").forEach(p => p.classList.remove("active"));
        document.querySelectorAll(".term-modern").forEach(p => p.classList.remove("active"));
        document.getElementById(`modern${cap(activeTab)}`).classList.add("active");
    } else {
        document.querySelectorAll(".term-modern").forEach(p => p.classList.remove("active"));
        document.querySelectorAll(".term-pane").forEach(p => p.classList.remove("active"));
        document.getElementById(`pane${cap(activeTab)}`).classList.add("active");
        const t = terminals[activeTab];
        if (t) { setTimeout(() => fitTerm(t.term, t.pane), 50); t.term.focus(); }
    }
}

// Called for every chunk of raw text received on a channel
function mvFeed(kind, raw) {
    if (!modernMode) return;
    const st = mvState[kind];
    // Strip ANSI escape codes
    const text = raw.replace(/\x1b\[[0-9;]*[mGKHFABCDJnr]/g, "")
                    .replace(/\r\n/g, "\n").replace(/\r/g, "\n");
    st.buffer += text;
    mvFlush(kind);
}

function mvFlush(kind) {
    const st = mvState[kind];
    const lines = st.buffer.split("\n");
    st.buffer = lines.pop(); // keep incomplete last line

    for (const line of lines) {
        mvProcessLine(kind, line);
    }
    // If buffer ends with a prompt line (e.g. ">", "WSTK>", "TK>")
    if (/^[^{]*>\s*$/.test(st.buffer.trim())) {
        mvProcessLine(kind, st.buffer.trim());
        st.buffer = "";
    }
}

function mvProcessLine(kind, line) {
    const st    = mvState[kind];
    const clean = line.trim();
    if (!clean) return;

    const isPrompt    = /^[^{]*>\s*$/.test(clean);
    const isCmd       = /^>\s+\S/.test(clean) && !/^>\s*\{/.test(clean);
    const rtMatch     = clean.match(/\{\{(\([^)]+\))/);
    const rtName      = rtMatch ? rtMatch[1].slice(1, -1) : null;
    const pendingBase = st.pending ? st.pending.cmd.split(/\s+/)[0] : null;
    const isRTResp    = rtName !== null && pendingBase !== null && rtName === pendingBase;
    const isRTEvent   = rtName !== null && !isRTResp;
    const rtComplete  = /\}\}\s*$/.test(clean);
    // Payload: starts with { but no (cmd), ends with }}
    const isPayload   = !rtName && /^\{[^(]/.test(clean) && rtComplete && !st.pending;

    // ── Prompt ──────────────────────────────────────────────────────────────
    if (isPrompt) {
        const cache = mvGroupCache[kind];
        const eBuf  = mvEventBuf[kind];

        // Flush buffered event lines — match with groups or display raw
        if (eBuf.length > 0) {
            const usedIdx = new Set();
            for (const ev of eBuf) {
                let matched = null;
                if (cache) {
                    const idx = cache.findIndex((gr, i) => !usedIdx.has(i) &&
                        ((gr.cmd && ev.raw.includes("(" + gr.cmd + ")")) ||
                         (gr.raw && gr.raw.some(r => r.trim().startsWith(ev.raw.slice(0, 20)))))
                    );
                    if (idx >= 0) { matched = cache[idx]; usedIdx.add(idx); }
                }
                if (matched) mvAddGroup(kind, matched);
                else mvAddEvent(kind, ev.raw.replace(/^>\s+/, ""));
            }
            const usedArr = Array.from(usedIdx).sort((a,b) => b-a);
            for (const i of usedArr) cache.splice(i, 1);
            mvEventBuf[kind] = [];
        }

        // Dispatch remaining cached groups (boot, multi-response, etc.)
        if (cache && cache.length > 0) {
            for (const g of cache.splice(0)) mvDispatchGroup(kind, g);
        }

        // Prompt = end of response — close pending immediately, no timer
        if (st.pending) {
            mvCloseCmd(kind, st.pending);
            st.pending = null;
        }
        return;
    }

    // ── Echoed command ───────────────────────────────────────────────────────
    if (isCmd) {
        const cmd = clean.replace(/^>\s+/, "");
        if (st.pending && st.pending.cmd === cmd) return;
        if (st.pending) { mvCloseCmd(kind, st.pending); }
        st.pending = { cmd, response: "", ts: mvTime() };
        st.lastEventEl = null;
        return;
    }

    // ── RAILtest complete line (event or response) ───────────────────────────
    if ((isRTEvent || isRTResp || isPayload) && rtComplete) {
        // Find matching group in cache by raw line content
        const cache = mvGroupCache[kind];
        let g = null;
        if (cache && cache.length > 0) {
            // Match: find first group whose cmd matches rtName, or whose raw line matches
            const stripped = clean.replace(/^>\s+/, "");
            const idx = cache.findIndex(gr => {
                // Match by cmd name (most reliable — works even with fragmented lines)
                if (rtName && gr.cmd === rtName) return true;
                // Fallback: raw line content match
                return gr.raw && gr.raw.some(r => {
                    const rt = r.trim();
                    return rt === clean || rt === stripped || rt.startsWith(stripped.slice(0, 20));
                });
            });
            if (idx >= 0) {
                g = cache.splice(idx, 1)[0];
            }
        }

        if (isRTEvent) {
            // Close pending if open (spontaneous event interrupts command)
            if (st.pending) {
                mvCloseCmd(kind, st.pending);
                st.pending = null;
            }
            if (g) {
                // Group matched immediately (e.g. rxPacket) — display now
                mvAddGroup(kind, g);
            } else {
                // No group yet — buffer until prompt (boot group arrives at prompt)
                mvEventBuf[kind].push({ raw: clean, ts: mvTime() });
            }
            return;
        }

        if (isRTResp) {
            // Response line — add to pending, wait for prompt to close
            // (don't close immediately — cmd may have additional multi-response lines)
            const displayVal = g ? g.summary : clean;
            if (st.pending) {
                if (clean === st.pending.cmd) return;
                st.pending.response += (st.pending.response ? "\n" : "") + displayVal;
                if (g && g.detail) {
                    st.pending._detail = (st.pending._detail || "") + (st.pending._detail ? "\n" : "") + g.detail;
                }
            }
            return;
        }

        if (isPayload) {
            // Payload bytes — attach to last event (rxPacket)
            if (st.lastEventEl) {
                const payloadText = g ? g.detail || g.summary : clean;
                const detail = st.lastEventEl.querySelector(".tm-detail");
                const header = st.lastEventEl.querySelector(".tm-block-header");
                if (detail) {
                    detail.textContent += "\n" + payloadText;
                } else {
                    st.lastEventEl.classList.remove("single");
                    const id = st.lastEventEl.id;
                    st.lastEventEl.setAttribute("onclick", `tmToggle('${id}','event')`);
                    const arrow = document.createElement("span");
                    arrow.className = "tm-arrow";
                    arrow.textContent = "\u25B6";
                    header.appendChild(arrow);
                    const d = document.createElement("div");
                    d.className = "tm-detail";
                    d.textContent = header.querySelector(".tm-summary").textContent + "\n" + payloadText;
                    st.lastEventEl.appendChild(d);
                }
                mvGetContainer(kind).scrollTop = mvGetContainer(kind).scrollHeight;
            }
            return;
        }
    }

    // ── Plain text / unknown ─────────────────────────────────────────────────
    if (st.pending) {
        if (clean === st.pending.cmd) return;
        st.pending.response += (st.pending.response ? "\n" : "") + clean;
    } else {
        mvAddEvent(kind, clean);
    }
}

function mvTime() {
    return new Date().toTimeString().slice(0, 8);
}

function mvGetContainer(kind) {
    return document.getElementById(`modern${cap(kind)}`);
}

function mvAddStatus(kind, msg) {
    const c = mvGetContainer(kind);
    const e = document.createElement("div");
    e.className = "tm-entry";
    e.innerHTML = `
        <div class="tm-spine"><div class="tm-dot tm-dot-status"></div><div class="tm-line"></div></div>
        <div class="tm-time">${mvTime()}</div>
        <div class="tm-block-status">${esc2(msg)}</div>`;
    c.appendChild(e);
    c.scrollTop = c.scrollHeight;
}

function mvCloseCmd(kind, pending) {
    const c   = mvGetContainer(kind);
    const rid = "tmr_" + Date.now() + Math.random().toString(36).slice(2);
    const hasResp = !!pending.response.trim();

    // First non-empty line of response
    const firstLine = pending.response.split("\n").find(l => l.trim()) || "";

    // ── Command block ──
    const ce = document.createElement("div");
    ce.className = "tm-entry";
    ce.innerHTML = `
        <div class="tm-spine"><div class="tm-dot tm-dot-cmd"></div><div class="tm-line"></div></div>
        <div class="tm-time">${pending.ts}</div>
        <div class="tm-block tm-block-cmd">
            <div class="tm-block-header">
                <span class="tm-summary">${esc2(pending.cmd)}</span>
            </div>
        </div>`;
    c.appendChild(ce);

    // ── Response block (indented) ──
    if (hasResp) {
        const lines = pending.response.trim().split("\n");
        const multiLine = lines.length > 1 || pending.response.trim().length > 70;
        // For single-line, show full text; for multi-line, truncate summary
        const displaySummary = multiLine
            ? (firstLine.length > 70 ? firstLine.substring(0, 70) + "…" : firstLine)
            : pending.response.trim();

        const re = document.createElement("div");
        re.className = "tm-entry tm-entry-response";
        re.innerHTML = `
            <div class="tm-spine tm-spine-resp"><div class="tm-dot tm-dot-resp"></div><div class="tm-line"></div></div>
            <div class="tm-time"></div>
            <div class="tm-block tm-block-resp${multiLine ? "" : " single"}" id="${rid}"
                 onclick="${multiLine ? `tmToggle('${rid}','resp')` : ''}">
                <div class="tm-block-header">
                    <span class="tm-summary tm-resp-summary">${esc2(displaySummary)}</span>
                    ${multiLine ? '<span class="tm-arrow">▶</span>' : ''}
                </div>
                ${multiLine ? `<div class="tm-response">${esc2(pending.response.trim())}</div>` : ''}
            </div>`;
        c.appendChild(re);
    }

    c.scrollTop = c.scrollHeight;

    // Open next pending from queue if any
    const nst = mvState[kind];
    if (nst.pendingQueue.length > 0) {
        nst.pending = nst.pendingQueue.shift();
    }
}

function mvAddEvent(kind, text) {
    // Script events are handled via terminal_script_event — skip plain text duplicates
    if (/^[▶✓✗]/.test(text.trim())) return;
    const c  = mvGetContainer(kind);
    const id = "tme_" + Date.now() + Math.random().toString(36).slice(2);
    const lines = text.trim().split("\n");
    const summary = lines[0];
    const multiLine = lines.length > 1;

    const e = document.createElement("div");
    e.className = "tm-entry";
    e.innerHTML = `
        <div class="tm-spine"><div class="tm-dot-icon">⚡</div><div class="tm-line"></div></div>
        <div class="tm-time">${mvTime()}</div>
        <div class="tm-block tm-block-event${multiLine ? "" : " single"}" id="${id}"
             onclick="${multiLine ? `tmToggle('${id}', 'event')` : ''}">
            <div class="tm-block-header">
                <span class="tm-summary" title="${esc2(text)}">${esc2(summary)}</span>
                ${multiLine ? '<span class="tm-arrow">▶</span>' : ''}
            </div>
            ${multiLine ? `<div class="tm-detail">${esc2(text)}</div>` : ''}
        </div>`;
    c.appendChild(e);

function tmToggle(id, type) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.toggle("expanded");
    const container = el.closest(".term-modern");
    if (container) setTimeout(() => container.scrollTop = container.scrollHeight, 50);

function esc2(s) {
    return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// ── Group rendering (server-parsed, called from terminal_output handler) ─────
// mvProcessGroup removed — groups consumed via mvGroupCache in mvProcessLine

// Dispatch a group that arrived at prompt flush (no raw line to consume it)
function mvDispatchGroup(kind, g) {
    const st = mvState[kind];
    if (g.type === "boot") { mvAddGroup(kind, g); return; }
    if (!g.cmd) { mvAddGroup(kind, g); return; }

    // Search pending and pendingQueue for a matching cmd
    const allPending = st.pending ? [st.pending, ...st.pendingQueue] : [...st.pendingQueue];
    const idx = allPending.findIndex(p => p.cmd.split(/\s+/)[0] === g.cmd);
    if (idx >= 0) {
        const matched = allPending[idx];
        const text = g.summary + (g.detail ? "\n" + g.detail : "");
        matched.response += (matched.response ? "\n" : "") + text;
        // Close matched pending
        if (matched === st.pending) {
            mvCloseCmd(kind, st.pending);
            st.pending = null;
        } else {
            // Remove from queue and display as completed cmd block
            st.pendingQueue.splice(idx - 1, 1);
            mvCloseCmd(kind, matched);
        }
        return;
    }
    mvAddGroup(kind, g);
}

// Track boot DOM elements by boot_id for incremental updates
var mvBootEls = {};

function mvAddGroup(kind, g) {
    const c = mvGetContainer(kind);

    // Boot update: same boot_id already rendered — update detail only
    if (g.type === "boot" && g.boot_id && !g.boot_first) {
        const existing = mvBootEls[g.boot_id];
        if (existing) {
            const detailEl = existing.querySelector(".tm-detail");
            if (detailEl && g.detail) {
                detailEl.textContent = g.detail;
            }
            c.scrollTop = c.scrollHeight;
            return;
        }
    }

    const id      = "tmg_" + Date.now() + Math.random().toString(36).slice(2);
    const color   = g.color && g.color !== "default" ? g.color : null;
    const blkCls  = color ? ` color-${color}` : "";
    const multi   = !!g.detail;
    // Pick timeline icon based on type/category/color
    const icon = g.type === "boot"                         ? "↺"
               : g.category === "rx"                       ? "↓"
               : g.category === "tx" && g.color==="error"  ? "✗"
               : g.category === "tx"                       ? "↑"
               : g.category === "script" && g.summary && g.summary.startsWith("▶") ? "▶"
               : g.category === "script"                   ? "✓"
               : g.color === "error"                       ? "✗"
               : g.color === "warning"                     ? "⚠"
               : "⚡";

    const e = document.createElement("div");
    e.className = "tm-entry";
    e.innerHTML = `
        <div class="tm-spine"><div class="tm-dot-icon">${icon}</div><div class="tm-line"></div></div>
        <div class="tm-time">${mvTime()}</div>
        <div class="tm-block tm-block-event${blkCls}${multi ? "" : " single"}" id="${id}"
             onclick="${multi ? `tmToggle('${id}','event')` : ''}">
            <div class="tm-block-header">
                <span class="tm-summary" title="${esc2(g.summary)}">${esc2(g.summary)}</span>
                ${multi ? '<span class="tm-arrow">▶</span>' : ''}
            </div>
            ${multi ? `<div class="tm-detail">${esc2(g.detail)}</div>` : ''}
        </div>`;
    c.appendChild(e);
    const blkEl = e.querySelector(".tm-block-event");
    mvState[kind].lastEventEl = blkEl;

    // Register boot element for future updates
    if (g.type === "boot" && g.boot_id) {
        mvBootEls[g.boot_id] = blkEl;
    }

    c.scrollTop = c.scrollHeight;
}

socket.on("terminal_script_event", ({ room, group }) => {
    const kind = room.split("_").pop();
    if (!modernMode) return;
    // Remove any raw text duplicate already displayed by mvAddEvent
    const c = mvGetContainer(kind);
    const existing = Array.from(c.querySelectorAll(".tm-summary")).find(
        el => el.textContent.trim() === group.summary.trim()
    );
    if (existing) {
        const entry = existing.closest(".tm-entry");
        if (entry) entry.remove();
    }
    mvAddGroup(kind, group);
});

        st.pending = newPending;
    } else {
        // Queue it — will be opened after current pending closes
        st.pendingQueue.push(newPending);
    }
});
</script>
