<!-- ── script control page fragment ── -->

<!-- barre de boutons centrée -->
<div class="test-source-bar" style="gap:12px; margin-bottom:16px;">
    <button id="scLoadBtn"   onclick="activateMode('load')">Load</button>
    <button id="scCreateBtn" onclick="activateMode('create')">Create</button>
    <button id="scCheckBtn"  onclick="onScCheck()" disabled>Check</button>
    <button id="scRunBtn"    onclick="onScRun()"   disabled>Run</button>
</div>

<!-- layout 2 colonnes -->
<div class="sc-grid">

    <!-- colonne gauche -->
    <div class="sc-panel">
        <div class="sc-panel-header">
            <span class="sc-panel-title" id="scLeftTitle">Scenarios</span>
            <div class="panel-spacer"></div>
            <!-- Load mode -->
            <button class="sc-browse-btn" id="scBrowseBtn" onclick="browseDirectory()">Browse…</button>
            <!-- Create mode -->
            <button class="sc-browse-btn" id="scNewDirBtn" onclick="newDirectory()" style="display:none">New dir…</button>
        </div>
        <div class="sc-dir-path" id="scDirPath">./scenari</div>
        <div class="sc-list-wrap" id="scListWrap">
            <div class="sc-hint">Click Load or Create</div>
        </div>
    </div>

    <!-- colonne droite -->
    <div class="sc-panel">
        <div class="sc-panel-header">
            <span class="sc-panel-title" id="scRightTitle">Content</span>
            <div class="panel-spacer"></div>
            <!-- Create mode buttons -->
            <button class="sc-browse-btn" id="scFromGroupBtn" onclick="toggleGroupPicker()" style="display:none">From group</button>
            <button class="sc-browse-btn" id="scSaveBtn" onclick="saveScenario()" style="display:none">Save…</button>
        </div>
        <!-- selected dir indicator (create mode) -->
        <div id="scSelectedDir" style="display:none" class="sc-dir-path">
            <span style="color:#8899aa">Directory: </span><span id="scSelectedDirName" style="color:#185FA5">— none selected —</span>
        </div>
        <!-- Load mode: view -->
        <div class="sc-yaml-wrap" id="scYamlView">
            <div class="sc-hint">Select a scenario to view its content</div>
        </div>
        <!-- Create mode: editor -->
        <textarea id="scYamlEditor" class="sc-yaml-editor" spellcheck="false" style="display:none; flex:1; margin:10px;"></textarea>
    </div>

</div>

<!-- floating group picker -->
<div class="group-panel" id="scGroupPicker">
    <div class="group-panel-header">
        <span class="group-panel-title">Start from group</span>
        <span class="group-close" onclick="closeGroupPicker()">✕</span>
    </div>
    <div class="group-panel-body">
        <div class="group-list" id="scGroupList"></div>
    </div>
</div>

<style>
.sc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    min-height: 0;
    flex: 1;
}
.sc-panel {
    background: #EFF2F9;
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow:
        -6px -6px 12px rgba(250, 251, 255, 1),
         6px  6px 12px rgba(22, 27, 29, 0.23);
}
.sc-panel-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(22, 27, 29, 0.08);
    flex-shrink: 0;
}
.sc-panel-title {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: #8899aa;
}
.sc-browse-btn {
    font-size: 11px;
    height: 24px;
    padding: 0 10px;
    border-radius: 7px;
    border: none;
    background: #EFF2F9;
    color: #6E7F8D;
    cursor: pointer;
    box-shadow:
        -2px -2px 4px rgba(250, 251, 255, 1),
         2px  2px 4px rgba(22, 27, 29, 0.23);
    transition: box-shadow .15s, color .15s;
}
.sc-browse-btn:hover { color: #4a5a68; }
.sc-browse-btn.open {
    box-shadow:
        inset -2px -2px 4px rgba(250, 251, 255, 1),
        inset  2px  2px 4px rgba(22, 27, 29, 0.23);
}
.sc-dir-path {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: #1D9E75;
    padding: 5px 14px;
    border-bottom: 1px solid rgba(22, 27, 29, 0.06);
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.sc-list-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 0;
}
.sc-group-title {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: #8899aa;
    padding: 4px 4px 2px;
    margin-top: 4px;
}
.sc-group-title:first-child { margin-top: 0; }

/* directory selectable in create mode */
.sc-dir-selectable {
    cursor: pointer;
    padding: 6px 8px;
    border-radius: 8px;
    transition: box-shadow .15s, color .15s;
    color: #6E7F8D;
}
.sc-dir-selectable:hover { color: #4a5a68; }
.sc-dir-active {
    color: #185FA5 !important;
    box-shadow:
        inset -2px -2px 4px rgba(250, 251, 255, 1),
        inset  2px  2px 4px rgba(22, 27, 29, 0.20);
}
.sc-item {
    display: flex;
    align-items: center;
    padding: 9px 12px;
    border-radius: 10px;
    background: #EFF2F9;
    cursor: pointer;
    transition: box-shadow .15s;
    box-shadow:
        -3px -3px 6px rgba(250, 251, 255, 1),
         3px  3px 6px rgba(22, 27, 29, 0.20);
}
.sc-item:hover {
    box-shadow:
        -4px -4px 8px rgba(250, 251, 255, 1),
         4px  4px 8px rgba(22, 27, 29, 0.26);
}
.sc-item-active {
    box-shadow:
        inset -3px -3px 6px rgba(250, 251, 255, 1),
        inset  3px  3px 6px rgba(22, 27, 29, 0.23);
}
.sc-item-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: #4a5a68;
    flex: 1;
}
/* yaml view */
.sc-yaml-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px;
    min-height: 0;
}
.sc-yaml-content {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: #4a5a68;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
}
.sc-yaml-key    { color: #185FA5; }
.sc-yaml-value  { color: #1D9E75; }
.sc-yaml-comment{ color: #b5bfc6; font-style: italic; }
.sc-yaml-dash   { color: #854F0B; }
/* yaml editor */
.sc-yaml-editor {
    flex: 1;
    width: 100%;
    min-height: 300px;
    resize: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    line-height: 1.7;
    color: #4a5a68;
    background: #EFF2F9;
    border: none;
    border-radius: 10px;
    padding: 10px 12px;
    outline: none;
    box-shadow:
        inset -3px -3px 6px rgba(250, 251, 255, 1),
        inset  3px  3px 6px rgba(22, 27, 29, 0.18);
}
.sc-select {
    width: 100%;
    height: 30px;
    padding: 0 10px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    color: #4a5a68;
    background: #EFF2F9;
    border: none;
    border-radius: 8px;
    outline: none;
    box-shadow:
        -2px -2px 4px rgba(250, 251, 255, 1),
         2px  2px 4px rgba(22, 27, 29, 0.20);
    cursor: pointer;
}
.sc-hint {
    font-size: 12px;
    color: #b5bfc6;
    text-align: center;
    padding: 28px 0;
}
/* scrollbars */
.sc-list-wrap::-webkit-scrollbar,
.sc-yaml-wrap::-webkit-scrollbar,
.sc-yaml-editor::-webkit-scrollbar    { width: 5px; }
.sc-list-wrap::-webkit-scrollbar-track,
.sc-yaml-wrap::-webkit-scrollbar-track,
.sc-yaml-editor::-webkit-scrollbar-track { background: transparent; }
.sc-list-wrap::-webkit-scrollbar-thumb,
.sc-yaml-wrap::-webkit-scrollbar-thumb,
.sc-yaml-editor::-webkit-scrollbar-thumb { background: #b5bfc6; border-radius: 3px; }
</style>

<script>
let activeScenario  = null;
let scenariBaseDir  = null;
let scMode          = null;  // "load" | "create"
let scSelectedDir   = null;  // directory selected in create mode

const YAML_TEMPLATE = `boards:
  - board: 
    jlink_name_or_ip: 
    masserase: true
    halt_reset: true
    open_terminal: true
    s37_files: 
      - .s37
    script: ""
`;

function onPageLoad() {
    if (window.appState.scenariDir) {
        scenariBaseDir = window.appState.scenariDir;
        document.getElementById("scDirPath").innerText = scenariBaseDir;
        activateMode("load");
    } else {
        fetch("/api/scenarios-default")
            .then(r => r.json())
            .then(d => {
                scenariBaseDir = d.path;
                window.appState.scenariDir = d.path;
                document.getElementById("scDirPath").innerText = d.path;
                activateMode("load");
            });
    }
}

// ── mode switching ────────────────────────────────
function activateMode(mode) {
    scMode = mode;

    document.getElementById("scLoadBtn").classList.toggle("open",   mode === "load");
    document.getElementById("scCreateBtn").classList.toggle("open", mode === "create");
    document.getElementById("scBrowseBtn").style.display    = mode === "load"   ? "" : "none";
    document.getElementById("scNewDirBtn").style.display    = mode === "create" ? "" : "none";
    document.getElementById("scFromGroupBtn").style.display = mode === "create" ? "" : "none";
    document.getElementById("scSaveBtn").style.display      = mode === "create" ? "" : "none";
    document.getElementById("scLeftTitle").innerText        = mode === "load" ? "Scenarios" : "Directories & Scenarios";
    document.getElementById("scRightTitle").innerText       = mode === "load" ? "Content" : "New Scenario";
    document.getElementById("scSelectedDir").style.display  = mode === "create" ? "" : "none";

    if (mode === "load") {
        document.getElementById("scYamlView").style.display   = "";
        document.getElementById("scYamlEditor").style.display = "none";
        document.getElementById("scCheckBtn").disabled        = true;
        document.getElementById("scRunBtn").disabled          = true;
    } else {
        document.getElementById("scYamlView").style.display   = "none";
        document.getElementById("scYamlEditor").style.display = "";
        document.getElementById("scYamlEditor").value         = YAML_TEMPLATE;
        scSelectedDir = null;
        document.getElementById("scSelectedDirName").innerText = "— none selected —";
    }

    loadScenarios();
}

// ── load scenarios (both modes) ───────────────────
async function loadScenarios() {
    if (!scenariBaseDir) return;
    const btn = document.getElementById("scLoadBtn");
    btn.disabled = true;
    try {
        const res  = await fetch(`/api/scenarios?dir=${encodeURIComponent(scenariBaseDir)}`);
        const data = await res.json();
        renderScenarios(data);
    } catch(e) { console.error("load scenarios failed:", e); }
    btn.disabled = false;
}

function renderScenarios(data) {
    const wrap = document.getElementById("scListWrap");
    wrap.innerHTML = "";
    if (!data || data.length === 0) {
        wrap.innerHTML = '<div class="sc-hint">No scenarios found</div>';
        return;
    }
    data.forEach(({ dir, files }) => {
        // Directory header — clickable in create mode
        const groupTitle = document.createElement("div");
        groupTitle.className = "sc-group-title" + (scMode === "create" ? " sc-dir-selectable" : "");
        groupTitle.innerText = dir;
        groupTitle.dataset.dir = dir;
        if (scMode === "create") {
            groupTitle.onclick = () => selectDirectory(dir);
        }
        wrap.appendChild(groupTitle);

        files.forEach(file => {
            const name = file.replace(/\.yaml$/, "");
            const key  = `${dir}/${file}`;
            const item = document.createElement("div");
            item.className = "sc-item";
            item.dataset.key = key;
            item.dataset.dir = dir;
            item.innerHTML = `<span class="sc-item-name">${name}</span>`;
            if (scMode === "load") {
                item.onclick = () => selectScenario(item, key, name, dir, file);
            } else {
                // In create mode: click scenario to copy it, click dir header to start fresh
                item.onclick = () => copyScenario(item, key, name, dir);
            }
            wrap.appendChild(item);
        });
    });
}

// ── Load mode ─────────────────────────────────────
async function selectScenario(el, key, name, dir, file) {
    document.querySelectorAll(".sc-item").forEach(i => i.classList.remove("sc-item-active"));
    el.classList.add("sc-item-active");
    activeScenario = { key, name, dir, file };
    document.getElementById("scCheckBtn").disabled = false;
    document.getElementById("scRunBtn").disabled   = false;
    document.getElementById("scRightTitle").innerText = name;
    try {
        const res  = await fetch(`/api/scenario-content?dir=${encodeURIComponent(scenariBaseDir)}&path=${encodeURIComponent(key)}`);
        const data = await res.json();
        renderYaml(data.content || "");
    } catch(e) {
        document.getElementById("scYamlView").innerHTML =
            `<div class="sc-hint" style="color:#E24B4A">Error loading file</div>`;
    }
}

// ── Create mode ───────────────────────────────────
function selectDirectory(dir) {
    scSelectedDir = dir;
    document.getElementById("scSelectedDirName").innerText = dir;
    // Highlight selected dir header
    document.querySelectorAll(".sc-group-title").forEach(t =>
        t.classList.toggle("sc-dir-active", t.dataset.dir === dir));
    document.querySelectorAll(".sc-item").forEach(i =>
        i.classList.remove("sc-item-active"));
    // Start from template
    document.getElementById("scYamlEditor").value = YAML_TEMPLATE;
    document.getElementById("scRightTitle").innerText = "New Scenario";
}

async function copyScenario(el, key, name, dir) {
    // Select parent dir too
    selectDirectory(dir);
    // Highlight this item
    document.querySelectorAll(".sc-item").forEach(i => i.classList.remove("sc-item-active"));
    el.classList.add("sc-item-active");
    document.getElementById("scRightTitle").innerText = `Copy of ${name}`;
    try {
        const res  = await fetch(`/api/scenario-content?dir=${encodeURIComponent(scenariBaseDir)}&path=${encodeURIComponent(key)}`);
        const data = await res.json();
        document.getElementById("scYamlEditor").value = data.content || YAML_TEMPLATE;
    } catch(e) {
        document.getElementById("scYamlEditor").value = YAML_TEMPLATE;
    }
}

async function newDirectory() {
    const name = prompt("New directory name:");
    if (!name || !name.trim()) return;
    try {
        await fetch("/api/scenario-mkdir", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ base: scenariBaseDir, dir: name.trim() })
        });
        await loadScenarios();
        // Auto-select the new directory
        selectDirectory(name.trim());
    } catch(e) { console.error(e); }
}

async function browseDirectory() {
    let dir = null;
    if (window.pywebview) {
        const result = await window.pywebview.api.pick_directory();
        dir = result || null;
    } else {
        dir = prompt("Enter scenari directory path:", scenariBaseDir);
    }
    if (dir) {
        scenariBaseDir = dir;
        window.appState.scenariDir = dir;
        document.getElementById("scDirPath").innerText = dir;
        await loadScenarios();
    }
}

// ── From group ────────────────────────────────────
async function toggleGroupPicker() {
    const panel = document.getElementById("scGroupPicker");
    if (panel.classList.contains("visible")) { closeGroupPicker(); return; }
    const btn  = document.getElementById("scFromGroupBtn");
    const rect = btn.getBoundingClientRect();
    panel.style.left  = rect.left + "px";
    panel.style.right = "auto";
    panel.style.top   = (rect.bottom + 8) + "px";
    panel.classList.add("visible");

    const container = document.getElementById("scGroupList");
    container.innerHTML = "";
    try {
        const res   = await fetch("/groups");
        const names = await res.json();
        if (names.length === 0) {
            container.innerHTML = '<div class="group-empty">No saved groups</div>';
            return;
        }
        for (const name of names) {
            const gres  = await fetch(`/groups/${encodeURIComponent(name)}`);
            const gdata = await gres.json();
            const count = (gdata.adapters || []).length;
            const item  = document.createElement("div");
            item.className = "group-item";
            item.innerHTML = `
                <span class="group-item-name">${name}</span>
                <span class="group-item-count">${count} adapter${count !== 1 ? "s" : ""}</span>`;
            item.onclick = () => { populateFromGroup(gdata); closeGroupPicker(); };
            container.appendChild(item);
        }
    } catch(e) { container.innerHTML = '<div class="group-empty">Error loading groups</div>'; }
}

function closeGroupPicker() {
    document.getElementById("scGroupPicker").classList.remove("visible");
}

function populateFromGroup(gdata) {
    const adapters = gdata.adapters || [];
    if (adapters.length === 0) return;
    const boards = adapters.map(a => {
        const isIP = a.connectivityType !== "usb";
        return [
            `  - board: `,
            `    jlink_name_or_ip: ${isIP && a.host ? a.host : ""}`,
            `    masserase: true`,
            `    halt_reset: true`,
            `    open_terminal: true`,
            `    s37_files:`,
            `      - .s37`,
            `    script: ""`,
        ].join("\n");
    }).join("\n");
    document.getElementById("scYamlEditor").value = `boards:\n${boards}\n`;
}

// ── Save ──────────────────────────────────────────
async function saveScenario() {
    if (!scSelectedDir) { alert("Please select a directory on the left first."); return; }
    const yaml = document.getElementById("scYamlEditor").value;
    if (!yaml.trim()) { alert("YAML content is empty."); return; }
    const name = prompt("Scenario name (without .yaml):");
    if (!name || !name.trim()) return;

    try {
        const res = await fetch("/api/scenario-save", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                base: scenariBaseDir, dir: scSelectedDir,
                name: name.trim(), content: yaml
            })
        });
        const data = await res.json();
        if (data.ok) {
            const btn = document.getElementById("scSaveBtn");
            btn.classList.add("open");
            setTimeout(() => btn.classList.remove("open"), 1500);
            await loadScenarios();
        } else {
            alert("Save failed: " + (data.error || "unknown error"));
        }
    } catch(e) { alert("Save error: " + e.message); }
}

// ── Yaml view ─────────────────────────────────────
function renderYaml(text) {
    const wrap = document.getElementById("scYamlView");
    const lines = text.split("\n").map(line => {
        if (/^\s*#/.test(line))
            return `<span class="sc-yaml-comment">${esc(line)}</span>`;
        if (/^\s*-\s/.test(line))
            return line.replace(/^(\s*-\s*)(.*)$/, (_, dash, rest) =>
                `<span class="sc-yaml-dash">${esc(dash)}</span>${highlightKeyVal(rest)}`);
        return highlightKeyVal(line);
    });
    wrap.innerHTML = `<pre class="sc-yaml-content">${lines.join("\n")}</pre>`;
}

function highlightKeyVal(line) {
    return line.replace(/^(\s*)([^:]+)(:)(\s*.*)$/, (_, indent, key, colon, val) =>
        `${esc(indent)}<span class="sc-yaml-key">${esc(key)}</span>${esc(colon)}<span class="sc-yaml-value">${esc(val)}</span>`
    );
}

function esc(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── Placeholders ──────────────────────────────────
function onScCheck() { /* TODO */ }
function onScRun()   { /* TODO */ }

document.addEventListener("click", e => {
    const panel = document.getElementById("scGroupPicker");
    if (!panel || !panel.classList.contains("visible")) return;
    if (panel.contains(e.target)) return;
    if (e.target.id === "scFromGroupBtn") return;
    closeGroupPicker();
});
</script>
