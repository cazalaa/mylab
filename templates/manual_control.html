<!-- ── manual control page fragment ── -->
<style>
/* ── source button neumorphique ── */
#testSourceBtn {
    height: 36px;
    padding: 0 20px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 500;
    background: #EFF2F9;
    color: #6E7F8D;
    border: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: box-shadow .2s, color .2s;
    box-shadow:
        -4px -4px 8px rgba(250, 251, 255, 1),
         4px  4px 8px rgba(22, 27, 29, 0.23);
}
#testSourceBtn::before { content: "▾"; font-size: 10px; opacity: .7; }
#testSourceBtn:hover   { color: #4a5a68; }

/* ── card buttons neumorphiques ── */
.test-card-buttons {
    padding: 14px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    background: #EFF2F9;
}

.test-btn-half {
    flex: 1;
    height: 34px;
    border-radius: 10px;
    border: none;
    background: #EFF2F9;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: #6E7F8D;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: box-shadow .15s, color .15s;
    box-shadow:
        -4px -4px 8px rgba(250, 251, 255, 1),
         4px  4px 8px rgba(22, 27, 29, 0.23);
}
.test-btn-half:hover  { color: #4a5a68; }
.test-btn-half:active {
    color: #4a5a68;
    box-shadow:
        inset -4px -4px 8px rgba(250, 251, 255, 1),
        inset  4px  4px 8px rgba(22, 27, 29, 0.23);
}
.test-btn-half:disabled { opacity: .45; pointer-events: none; }
.test-btn-hidden { visibility: hidden; }

/* card background neumorphique */
.test-card {
    width: 250px;
    background: #EFF2F9;
    border: none;
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow:
        -8px -8px 16px rgba(250, 251, 255, 1),
         8px  8px 16px rgba(22, 27, 29, 0.23);
}
.test-card-header {
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 12px 14px;
    background: #EFF2F9;
    border-bottom: 1px solid rgba(22, 27, 29, 0.08);
}
</style>

<!-- header source : centré sur une ligne -->
<div class="test-source-bar">
    <button id="testSourceBtn" onclick="toggleSourcePanel()">All available</button>
</div>

<!-- liste des cartes -->
<div id="testCardList" style="display:flex; flex-wrap:wrap; gap:16px; padding:4px 2px; margin-top:16px;"></div>
<div id="testEmpty" class="drop-hint" style="display:none; margin-top:16px;">No adapters to display</div>

<!-- panneau flottant source -->
<div class="group-panel" id="sourcePanel">
    <div class="group-panel-header">
        <span class="group-panel-title">Select source</span>
        <span class="group-close" onclick="closeSourcePanel()">✕</span>
    </div>
    <div class="group-panel-body">
        <div class="group-list" id="sourceList"></div>
    </div>
</div>

<script>
let testAdapters = [];
let testSource   = "available";

function onPageLoad() {
    renderFromSource(testSource);
}

// ── source panel ──────────────────────────────────
function closeSourcePanel() {
    document.getElementById("sourcePanel").classList.remove("visible");
}

async function toggleSourcePanel() {
    const panel = document.getElementById("sourcePanel");
    if (panel.classList.contains("visible")) { closeSourcePanel(); return; }

    const btn  = document.getElementById("testSourceBtn");
    const rect = btn.getBoundingClientRect();
    panel.style.left  = rect.left + "px";
    panel.style.right = "auto";
    panel.style.top   = (rect.bottom + 8) + "px";
    panel.classList.add("visible");

    await refreshSourceList();
}

async function refreshSourceList() {
    const container = document.getElementById("sourceList");
    container.innerHTML = "";

    const allCount = (window.appState.cache || []).length;
    addSourceItem(container, "available", "All available", allCount, testSource === "available");

    try {
        const res   = await fetch("/groups");
        const names = await res.json();
        for (const name of names) {
            const gres  = await fetch(`/groups/${encodeURIComponent(name)}`);
            const gdata = await gres.json();
            const count = (gdata.adapters || []).length;
            addSourceItem(container, name, name, count, testSource === name, gdata);
        }
    } catch(e) {}

    if (container.children.length === 0) {
        container.innerHTML = '<div class="group-empty">No sources available</div>';
    }
}

function addSourceItem(container, key, label, count, active, gdata) {
    const item = document.createElement("div");
    item.className = "group-item" + (active ? " source-active" : "");
    item.innerHTML = `
        <span class="group-item-name">${label}</span>
        <span class="group-item-count">${count} adapter${count !== 1 ? "s" : ""}</span>`;
    item.onclick = () => {
        selectSource(key, gdata);
        closeSourcePanel();
    };
    container.appendChild(item);
}

function selectSource(key, gdata) {
    testSource = key;
    document.getElementById("testSourceBtn").innerText =
        key === "available" ? "All available" : key;
    renderFromSource(key, gdata);
}

// ── render ────────────────────────────────────────
async function renderFromSource(key, gdata) {
    const cache = window.appState.cache || [];

    let adapters = [];
    if (key === "available") {
        adapters = cache;
    } else {
        if (!gdata) {
            try {
                const r = await fetch(`/groups/${encodeURIComponent(key)}`);
                gdata   = await r.json();
            } catch(e) { gdata = { adapters: [] }; }
        }
        const serials = new Set((gdata.adapters || []).map(a => a.serialNumber));
        adapters = cache.filter(a => serials.has(a.serialNumber));
    }

    testAdapters = adapters;
    renderTestCards(adapters);
}

function renderTestCards(adapters) {
    const container = document.getElementById("testCardList");
    const empty     = document.getElementById("testEmpty");
    container.innerHTML = "";

    if (!adapters || adapters.length === 0) {
        empty.style.display = "";
        return;
    }
    empty.style.display = "none";

    adapters.forEach(a => {
        const isIP       = a.connectivityType !== "usb";
        const isTTY      = a.ttyMode === true;  // ← TTY mode = empty connections
        const typeLabel  = isIP && a.host ? a.host : (a.connectivityType || "?");
        const typeClass  = isIP ? "pill-ip" : "pill-usb";
        const boardLabel = a.boardLabel || "";
        const descLabel  = a.label      || "";

        const card = document.createElement("div");
        card.className = "test-card";
        card.innerHTML = `
            <div class="test-card-header">
                <div class="test-card-top">
                    <div class="board-serial-line">
                        <span class="board-serial">${a.serialNumber}</span>
                        ${a.nickname ? `<span class="board-nickname"> — ${a.nickname}</span>` : ""}
                    </div>
                    <span class="pill ${typeClass}">${typeLabel}</span>
                </div>
                ${boardLabel ? `<div class="board-label">${boardLabel}</div>` : ""}
                ${descLabel  ? `<div class="board-desc">${descLabel}</div>`   : ""}
            </div>
            <div class="test-card-buttons">
                <div class="test-btn-row">
                    <button class="test-btn-half" data-serial="${a.serialNumber}" onclick="onCli(this)">Cli</button>
                    <button class="test-btn-half" data-serial="${a.serialNumber}" onclick="onReset(this)">Reset</button>
                </div>
                <div class="test-btn-row">
                    <button class="test-btn-half ${isTTY ? 'test-btn-hidden' : ''}"
                            data-serial="${a.serialNumber}" data-pb="1" onclick="onPb(this)">Pb1</button>
                    <button class="test-btn-half ${isTTY ? 'test-btn-hidden' : ''}"
                            data-serial="${a.serialNumber}" data-pb="0" onclick="onPb(this)">Pb0</button>
                </div>
            </div>`;
        container.appendChild(card);
    });
}

async function sendAdminCommand(serial, cmd) {
    await fetch(`/api/adapter/${serial}/admin-cmd`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ cmd })
    });
}

async function onCli(btn) {
    const serial = btn.dataset.serial;
    if (window.pywebview) {
        window.pywebview.api.open_terminal(serial);
    } else {
        // fallback navigateur classique
        window.open(`/terminal/${serial}`, `terminal_${serial}`, "width=820,height=520");
    }
    await new Promise(r => setTimeout(r, 1000));
    const label  = btn.innerText;
    btn.innerText = "…";
    btn.disabled  = true;
    await sendAdminCommand(serial, "target button enable");
    btn.innerText = "✓";
    btn.classList.add("success");
    setTimeout(() => {
        btn.classList.remove("success");
        btn.innerText = label;
        btn.disabled  = false;
    }, 2000);
}

async function onReset(btn) {
    const serial = btn.dataset.serial;
    const label  = btn.innerText;
    btn.innerText = "…";
    btn.disabled  = true;
    await sendAdminCommand(serial, "target reset 100");
    btn.innerText = "✓";
    btn.classList.add("success");
    setTimeout(() => {
        btn.classList.remove("success");
        btn.innerText = label;
        btn.disabled  = false;
    }, 2000);
}

async function onPb(btn) {
    const serial = btn.dataset.serial;
    const pb     = btn.dataset.pb;
    const label  = btn.innerText;
    btn.innerText = "…";
    btn.disabled  = true;
    await sendAdminCommand(serial, `target button press ${pb}`);
    await new Promise(r => setTimeout(r, 100));
    await sendAdminCommand(serial, `target button release ${pb}`);
    btn.innerText = "✓";
    btn.classList.add("success");
    setTimeout(() => {
        btn.classList.remove("success");
        btn.innerText = label;
        btn.disabled  = false;
    }, 2000);
}

document.addEventListener("click", e => {
    const panel = document.getElementById("sourcePanel");
    if (!panel || !panel.classList.contains("visible")) return;
    if (panel.contains(e.target)) return;
    if (e.target.id === "testSourceBtn") return;
    closeSourcePanel();
});
</script>
