<!-- ── maintenance page fragment ── -->

<!-- barre groupe centrée -->
<div class="test-source-bar" style="gap:12px; margin-bottom:14px;">
    <button id="saveGroupBtn"   onclick="toggleGroupPanel('save','saveGroupBtn')">Save Group</button>
    <button id="loadGroupBtn"   onclick="toggleGroupPanel('load','loadGroupBtn')">Load Group</button>
    <button id="deleteGroupBtn" onclick="toggleGroupPanel('delete','deleteGroupBtn')">Delete Group</button>
</div>

<div class="grid">

    <!-- AVAILABLE -->
    <div class="panel">
        <div class="panel-header">
            <span class="panel-title">Available</span>
            <span class="panel-count" id="availableCount">0</span>
            <div class="panel-spacer"></div>
            <button id="myDeskBtn" onclick="toggleMyDesk()" class="btn-toggle">My Desk</button>
            <button id="refreshBtn" onclick="refresh()" data-icon="Refresh">Refresh</button>
            <div class="btn-sep"></div>
            <button id="allBtn" onclick="addAll()">Select All</button>
        </div>
        <div class="panel-body" id="list"></div>
    </div>

    <!-- SELECTED -->
    <div class="panel">
        <div class="panel-header">
            <span class="panel-title">Selected</span>
            <span class="panel-count" id="selectedCount">0</span>
            <div class="panel-spacer"></div>
            <button id="eraseBtn"   onclick="massErase()"   >Chip Erase</button>
            <button id="recoverBtn" onclick="chipRecover()" >Chip Recover</button>
            <button id="fwBtn"      onclick="upgradeFW()"   >Board Upgrade</button>
        </div>
        <div class="panel-body" id="selected"
             ondragover="event.preventDefault(); this.classList.add('drag-over')"
             ondragleave="this.classList.remove('drag-over')"
             ondrop="this.classList.remove('drag-over'); onDrop(event)">
            <div class="drop-hint" id="dropHint">Drag adapters here or click Select All</div>
        </div>
    </div>

</div>


<!-- floating group panel -->
<div class="group-panel" id="groupPanel">
    <div class="group-panel-header">
        <span class="group-panel-title" id="groupPanelTitle">Groups</span>
        <span class="group-close" onclick="closeGroupPanel()">✕</span>
    </div>
    <div class="group-panel-body">
        <div class="group-input-row" id="saveRow" style="display:none">
            <input class="group-input" id="groupNameInput" placeholder="group name" />
            <button onclick="saveGroup()">Save</button>
        </div>
        <div class="group-list" id="groupList"></div>
    </div>
</div>

<script>
var selected = (window.appState && window.appState.selected) || new Set();
var cache    = (window.appState && window.appState.cache)    || [];
var groupPanelMode = null;

function onPageLoad() {
    selected = (window.appState && window.appState.selected) || new Set();
    cache    = (window.appState && window.appState.cache)    || [];
    updateCounts();
    if (selected.size > 0) renderSelected();
    load().then(() => {
        const btn = document.getElementById("myDeskBtn");
        if (btn) btn.classList.toggle("open", myDesk);
    });
}

var myDesk = false;

async function toggleMyDesk() {
    myDesk = !myDesk;
    await load();
    const btn = document.getElementById("myDeskBtn");
    if (btn) btn.classList.toggle("open", myDesk);
}

function visibleCache() {
    return myDesk ? cache.filter(a => a.connectivityType === "usb") : cache;
}

// ── counts ────────────────────────────────────────
function updateCounts() {
    document.getElementById("availableCount").innerText = visibleCache().length;
    document.getElementById("selectedCount").innerText  = selected.size;
}

// ── progress (dans la topbar parente) ─────────────
function showProgress(label, done, total) {
    document.getElementById("progressWrap").classList.add("visible");
    const bar = document.getElementById("progressBar");
    bar.classList.remove("done-ok", "done-err");
    document.getElementById("progressLabel").innerText = `${label}  ${done} / ${total} adapters`;
    bar.style.width = total > 0 ? `${Math.round(done / total * 100)}%` : "0%";
}

function finishProgress(allOk) {
    const bar = document.getElementById("progressBar");
    bar.classList.add(allOk ? "done-ok" : "done-err");
    setTimeout(() => {
        document.getElementById("progressWrap").classList.remove("visible");
        bar.classList.remove("done-ok", "done-err");
        bar.style.width = "0%";
    }, 3500);
}

// ── lock buttons ──────────────────────────────────
function setButtonsLocked(locked) {
    ["refreshBtn","allBtn","myDeskBtn","saveGroupBtn","loadGroupBtn","deleteGroupBtn","eraseBtn","recoverBtn","fwBtn"]
        .forEach(id => { const el = document.getElementById(id); if (el) el.disabled = locked; });
}

// ── refresh ───────────────────────────────────────
async function refresh() {
    const btn  = document.getElementById("refreshBtn");
    const icon = btn.dataset.icon;
    btn.innerText = "…";
    btn.classList.remove("success");
    await fetch('/scan', { method: 'POST' });
    await new Promise(r => setTimeout(r, 1500));
    await load();
    btn.innerText = "✓";
    btn.classList.add("success");
    setTimeout(() => { btn.classList.remove("success"); btn.innerText = icon; }, 3000);
}

// ── load adapters ─────────────────────────────────
async function load() {
    const res = await fetch('/adapters');
    cache = await res.json();
    if (window.appState) window.appState.cache = cache;

    const list = document.getElementById("list");
    list.innerHTML = "";

    if (cache.length === 0) {
        list.innerHTML = '<div class="drop-hint">No adapters found</div>';
        updateCounts();
        return;
    }

    visibleCache().forEach(a => {
        const card = document.createElement("div");
        card.className = "board-card";
        card.draggable = true;
        card.ondragstart = e => e.dataTransfer.setData("t", JSON.stringify(a));
        card.onclick = () => addBoard(a);

        const isIP         = a.connectivityType !== "usb";
        const nicknameSpan = a.nickname ? `<span class="board-nickname"> — ${a.nickname}</span>` : "";
        const secondLine   = [a.boardLabel, a.label].filter(Boolean).join(" · ");
        const typeLabel    = isIP && a.host ? a.host : (a.connectivityType || "?");
        const typeClass    = isIP ? "pill-ip" : "pill-usb";

        card.innerHTML = `
            <div class="board-info">
                <div class="board-serial-line">
                    <span class="board-serial">${a.serialNumber}</span>
                    ${nicknameSpan}
                </div>
                <span class="board-label">${secondLine}</span>
            </div>
            <div class="board-right">
                <span class="pill ${typeClass}">${typeLabel}</span>
                ${selected.has(a.serialNumber) ? '<span class="star-icon">★</span>' : ''}
            </div>`;
        list.appendChild(card);
    });

    updateCounts();
}

// ── selected panel ────────────────────────────────
function renderSelected() {
    const container = document.getElementById("selected");
    const hint      = document.getElementById("dropHint");
    container.querySelectorAll(".sel-card").forEach(e => e.remove());

    if (selected.size === 0) {
        hint.style.display = "";
        updateCounts();
        return;
    }
    hint.style.display = "none";

    cache.filter(a => selected.has(a.serialNumber)).forEach(a => {
        const isIP       = a.connectivityType !== "usb";
        const secondLine = [a.boardLabel, a.label].filter(Boolean).join(" · ");
        const hostSuffix = isIP && a.host ? ` — ${a.host}` : "";

        const card = document.createElement("div");
        card.className = "sel-card";
        card.dataset.serial = a.serialNumber;
        card.innerHTML = `
            <div>
                <div class="sel-serial">
                    ${a.serialNumber}
                    ${a.nickname ? `<span class="sel-serial-nick"> — ${a.nickname}</span>` : ""}
                </div>
                <div class="sel-id">${secondLine}${hostSuffix}</div>
            </div>
            <div style="display:flex;align-items:center;gap:6px">
                <span class="card-status" id="status-${a.serialNumber}"></span>
                <button class="remove-btn" title="Remove">✕</button>
            </div>`;
        card.querySelector(".remove-btn").onclick = () => {
            selected.delete(a.serialNumber);
            renderSelected();
            load();
        };
        container.appendChild(card);
    });

    updateCounts();
}

// ── card status ───────────────────────────────────
function setCardStatus(serial, state) {
    const el = document.getElementById(`status-${serial}`);
    if (!el) return;
    el.className = `card-status ${state}`;
    el.innerText = state === "ok" ? "✓" : state === "err" ? "✕" : "";
    const card = el.closest(".sel-card");
    if (card) card.classList.toggle("running", state === "spinning");
}

// ── generic action runner ─────────────────────────
async function runAction(btnId, icon, endpoint, label) {
    const btn  = document.getElementById(btnId);
    const list = cache.filter(a => selected.has(a.serialNumber));
    const total = list.length;
    if (total === 0) return;

    btn.innerText = "…";
    btn.classList.remove("success", "error");
    setButtonsLocked(true);
    list.forEach(a => setCardStatus(a.serialNumber, "spinning"));
    showProgress(label, 0, total);

    const res = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ adapters: list })
    });
    const results = await res.json();

    for (let i = 0; i < results.length; i++) {
        const r = results[i];
        setCardStatus(r.serialNumber, r.ok ? "ok" : "err");
        showProgress(label, i + 1, total);
        await new Promise(r => setTimeout(r, 120));
    }

    const allOk = results.every(r => r.ok);
    btn.innerText = allOk ? "✓" : "✕";
    btn.classList.add(allOk ? "success" : "error");
    setButtonsLocked(false);
    finishProgress(allOk);

    // Rapport d'erreurs
    const failed = results.filter(r => !r.ok);
    if (failed.length > 0) showErrorReport(label, failed);

    setTimeout(() => {
        btn.classList.remove("success", "error");
        btn.innerText = icon;
        results.forEach(r => setCardStatus(r.serialNumber, ""));
}, 4000);
}

function showErrorReport(action, failed) {
    const existing = document.getElementById("errorReport");
    if (existing) existing.remove();

    const report = document.createElement("div");
    report.id = "errorReport";
    report.className = "error-report";
    report.innerHTML = `
        <div class="error-report-header">
            <span class="error-report-title">⚠ ${action} — ${failed.length} failure${failed.length > 1 ? "s" : ""}</span>
            <span class="error-report-close" onclick="this.closest('.error-report').remove()">✕</span>
        </div>
        <div class="error-report-body">
            ${failed.map(r => `
                <div class="error-report-item">
                    <span class="error-report-serial">${r.serialNumber}</span>
                    <span class="error-report-msg">${r.error || "Unknown error"}</span>
                </div>`).join("")}
        </div>`;
    document.getElementById("contentWrap").appendChild(report);
}
async function massErase()  { await runAction("eraseBtn",   "Erase",   "/mass_erase",  "Erasing");   }
async function chipRecover(){ await runAction("recoverBtn", "Recover", "/chip_recover", "Recovering"); }
async function upgradeFW()  { await runAction("fwBtn",      "↑ FW",    "/fw_upgrade",  "Upgrading FW"); }

// ── selection ─────────────────────────────────────
function addBoard(a) {
    if (selected.has(a.serialNumber)) return;
    selected.add(a.serialNumber);
    renderSelected();
    load();
}

function addAll() { visibleCache().forEach(addBoard); }

function onDrop(e) {
    const a = JSON.parse(e.dataTransfer.getData("t"));
    addBoard(a);
}

// ── group panel ───────────────────────────────────
function closeGroupPanel() {
    document.getElementById("groupPanel").classList.remove("visible");
    groupPanelMode = null;
}

async function toggleGroupPanel(mode, anchorId) {
    const panel  = document.getElementById("groupPanel");
    const isOpen = panel.classList.contains("visible") && groupPanelMode === mode;
    // Always remove visible first to reset state cleanly
    panel.classList.remove("visible");
    if (isOpen) { groupPanelMode = null; return; }

    groupPanelMode = mode;
    const titles = { save: "Save group", load: "Load group", delete: "Delete group" };
    document.getElementById("groupPanelTitle").innerText = titles[mode] || mode;
    document.getElementById("saveRow").style.display = mode === "save" ? "flex" : "none";

    const anchor = document.getElementById(anchorId);
    const rect   = anchor.getBoundingClientRect();
    panel.style.top   = (rect.bottom + 6) + "px";
    const panelW = 300;
    let left = rect.left + (rect.width / 2) - (panelW / 2);
    left = Math.max(8, Math.min(left, window.innerWidth - panelW - 8));
    panel.style.left  = left + "px";
    panel.style.right = "auto";

    await refreshGroupList(mode);
    panel.classList.add("visible");
    if (mode === "save") setTimeout(() => document.getElementById("groupNameInput").focus(), 50);
}

async function refreshGroupList(mode) {
    const res   = await fetch("/groups");
    const names = await res.json();
    const container = document.getElementById("groupList");
    container.innerHTML = "";

    if (names.length === 0) {
        container.innerHTML = '<div class="group-empty">No saved groups</div>';
        return;
    }

    for (const name of names) {
        const gres  = await fetch(`/groups/${encodeURIComponent(name)}`);
        const gdata = await gres.json();
        const count = (gdata.adapters || []).length;

        const item = document.createElement("div");
        item.className = "group-item";
        // Show 🗑 in save and delete mode, hide in load mode
        const delVisible = mode !== "load";
        item.innerHTML = `
            <span class="group-item-name">${name}</span>
            <span class="group-item-count">${count} adapter${count !== 1 ? "s" : ""}</span>
            <span class="group-item-del" title="Delete" style="${delVisible ? '' : 'display:none'}">🗑</span>`;

        const doDelete = async (e) => {
            e.stopPropagation();
            await fetch(`/groups/${encodeURIComponent(name)}`, { method: "DELETE" });
            await refreshGroupList(mode);
        };

        if (mode === "delete") {
            // In delete mode: clicking name/count or 🗑 all delete
            item.querySelector(".group-item-name").onclick  = doDelete;
            item.querySelector(".group-item-count").onclick = doDelete;
            item.querySelector(".group-item-del").onclick   = doDelete;
        } else if (mode === "load") {
            const onSelect = () => loadGroup(name, gdata);
            item.querySelector(".group-item-name").onclick  = onSelect;
            item.querySelector(".group-item-count").onclick = onSelect;
        } else {
            // save mode: click name/count to prefill, 🗑 to delete
            const onSelect = () => { document.getElementById("groupNameInput").value = name; };
            item.querySelector(".group-item-name").onclick  = onSelect;
            item.querySelector(".group-item-count").onclick = onSelect;
            item.querySelector(".group-item-del").onclick   = doDelete;
        }

        container.appendChild(item);
    }
}

async function saveGroup() {
    const name = document.getElementById("groupNameInput").value.trim();
    if (!name) return;

    const adapters = cache
        .filter(a => selected.has(a.serialNumber))
        .map(a => ({
            serialNumber:     a.serialNumber,
            connectivityType: a.connectivityType,
            ...(a.connectivityType !== "usb" && a.host ? { host: a.host } : {}),
            ...(a.nickname   ? { nickname:   a.nickname   } : {}),
            ...(a.boardId    ? { boardId:    a.boardId    } : {}),
            ...(a.boardLabel ? { boardLabel: a.boardLabel } : {}),
        }));

    await fetch(`/groups/${encodeURIComponent(name)}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, adapters })
    });

    await refreshGroupList("save");
}

function loadGroup(name, gdata) {
    selected.clear();
    for (const entry of gdata.adapters || []) {
        const found = cache.find(a => a.serialNumber === entry.serialNumber);
        if (found) selected.add(found.serialNumber);
    }
    renderSelected();
    load();
    closeGroupPanel();
}

document.addEventListener("click", e => {
    const panel = document.getElementById("groupPanel");
    if (!panel) return;
    if (!panel.classList.contains("visible")) return;
    if (panel.contains(e.target)) return;
    if (["saveGroupBtn","loadGroupBtn"].includes(e.target.id)) return;
    closeGroupPanel();
});
</script>
