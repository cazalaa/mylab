<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/xterm.min.css">
<script src="/static/xterm.min.js"></script>
<script src="/static/socket.io.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: #EFF2F9;
    color: #4a5a68;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ── header ── */
.term-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: #EFF2F9;
    flex-shrink: 0;
}
.term-serial {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: #4a5a68;
}
.term-label { font-size: 11px; color: #8899aa; }
.term-host {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #1D9E75;
    margin-left: auto;
}

/* ── tabs ── */
.term-tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 0 16px 10px;
    background: #EFF2F9;
    flex-shrink: 0;
}
.term-tab {
    padding: 6px 20px;
    font-size: 12px;
    font-weight: 500;
    color: #6E7F8D;
    cursor: pointer;
    border-radius: 10px;
    border: none;
    background: #EFF2F9;
    transition: box-shadow .2s, color .2s;
    user-select: none;
    box-shadow:
        -4px -4px 8px rgba(250, 251, 255, 1),
         4px  4px 8px rgba(22, 27, 29, 0.23);
}
.term-tab:hover { color: #4a5a68; }
.term-tab.active {
    color: #4a5a68;
    box-shadow:
        inset -4px -4px 8px rgba(250, 251, 255, 1),
        inset  4px  4px 8px rgba(22, 27, 29, 0.23);
}

.term-tab-status {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #b5bfc6;
    margin-right: 6px;
    vertical-align: middle;
}
.term-tab-status.connected  { background: #1D9E75; }
.term-tab-status.error      { background: #E24B4A; }
.term-tab-status.connecting { background: #EF9F27; }

/* ── terminal panes ── */
.term-panes {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    padding: 0 16px;
}
.term-pane {
    flex: 1;
    display: none;
    overflow: hidden;
    min-height: 0;
    border-radius: 14px;
    box-shadow:
        inset -4px -4px 8px rgba(250, 251, 255, 1),
        inset  4px  4px 8px rgba(22, 27, 29, 0.18);
}
.term-pane.active { display: flex; flex-direction: column; }

/* xterm fills the pane */
.term-pane .xterm          { flex: 1; min-height: 0; border-radius: 14px; }
.term-pane .xterm-viewport { overflow-y: scroll !important; border-radius: 14px; }

/* scrollbar */
.term-pane .xterm-viewport::-webkit-scrollbar       { width: 6px; }
.term-pane .xterm-viewport::-webkit-scrollbar-track { background: transparent; }
.term-pane .xterm-viewport::-webkit-scrollbar-thumb { background: #b5bfc6; border-radius: 3px; }
.term-pane .xterm-viewport::-webkit-scrollbar-thumb:hover { background: #6E7F8D; }

/* ── action bar (Reset/PB) ── */
.term-action-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 6px 16px 4px;
    background: #EFF2F9;
    flex-shrink: 0;
}
.term-action-btn {
    height: 32px;
    width: 80px;
    border-radius: 10px;
    border: none;
    background: #EFF2F9;
    color: #6E7F8D;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: box-shadow .15s, color .15s;
    box-shadow:
        -4px -4px 8px rgba(250, 251, 255, 1),
         4px  4px 8px rgba(22, 27, 29, 0.23);
}
.term-action-btn:hover  { color: #4a5a68; }
.term-action-btn:active {
    color: #4a5a68;
    box-shadow:
        inset -4px -4px 8px rgba(250, 251, 255, 1),
        inset  4px  4px 8px rgba(22, 27, 29, 0.23);
}
.term-action-btn:disabled { opacity: .4; pointer-events: none; }

/* ── input bar ── */
.term-input-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 16px 10px;
    background: #EFF2F9;
    flex-shrink: 0;
}
.term-prompt {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    color: #1D9E75;
    flex-shrink: 0;
}
.term-input {
    flex: 1;
    height: 34px;
    padding: 0 12px;
    background: #EFF2F9;
    border: none;
    border-radius: 10px;
    outline: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: #4a5a68;
    caret-color: #1D9E75;
    box-shadow:
        inset -3px -3px 6px rgba(250, 251, 255, 1),
        inset  3px  3px 6px rgba(22, 27, 29, 0.18);
}
.term-input::placeholder { color: #b5bfc6; }
.term-send-btn {
    width: 34px; height: 34px;
    padding: 0;
    border-radius: 10px;
    border: none;
    background: #EFF2F9;
    color: #6E7F8D;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: box-shadow .15s, color .15s;
    box-shadow:
        -3px -3px 6px rgba(250, 251, 255, 1),
         3px  3px 6px rgba(22, 27, 29, 0.23);
}
.term-send-btn:hover { color: #4a5a68; }
.term-send-btn:active {
    box-shadow:
        inset -3px -3px 6px rgba(250, 251, 255, 1),
        inset  3px  3px 6px rgba(22, 27, 29, 0.23);
}
</style>
</head>
<body>

<div class="term-header">
    <div>
        <div class="term-serial" id="termSerial">—</div>
        <div class="term-label"  id="termLabel">Loading…</div>
    </div>
    <div class="term-host" id="termHost">—</div>
</div>

<div class="term-tabs">
    <div class="term-tab active" id="tabVcom"  onclick="switchTab('vcom')">
        <span class="term-tab-status connecting" id="statusVcom"></span>VCOM
    </div>
    <div class="term-tab" id="tabAdmin" onclick="switchTab('admin')">
        <span class="term-tab-status connecting" id="statusAdmin"></span>ADMIN
    </div>
</div>

<div class="term-panes">
    <div class="term-pane active" id="paneVcom"></div>
    <div class="term-pane"        id="paneAdmin"></div>
</div>

<div class="term-input-bar">
    <span class="term-prompt">›</span>
    <input type="text" id="termInput" class="term-input" 
           placeholder="Type command…" autocomplete="off" spellcheck="false"/>
    <button class="term-send-btn" onclick="sendCommand()">⏎</button>
</div>

<div class="term-action-bar" id="termActionBar" style="display:none">
    <button class="term-action-btn" onclick="termCmd('target reset 100')">Reset</button>
    <button class="term-action-btn" onclick="termPb(1)">PB1</button>
    <button class="term-action-btn" onclick="termPb(0)">PB0</button>
</div>

<script>
const serial    = location.pathname.split("/").filter(p => p.length > 0).pop();
const socket    = io();
socket.on("connect", () => {
    console.log("socket connected:", socket.id);
});
socket.on("connect_error", (e) => {
    console.error("socket error:", e);
});
socket.on("terminal_echo", ({ data, room }) => {
    const kind = room.split("_").pop();
    terminals[kind]?.term.writeln(`\x1b[38;5;244m${data}\x1b[0m`);
});
let info        = null;
let terminals   = {};
let activeTab   = "vcom";

// ── historique des commandes ──────────────────────
const cmdHistory = [];
let historyIdx   = -1;

document.addEventListener("DOMContentLoaded", () => {
    const input = document.getElementById("termInput");
    if (!input) return;

    input.addEventListener("keydown", e => {
        if (e.key === "Enter") {
            sendCommand();
        } else if (e.key === "ArrowUp") {
            e.preventDefault();
            if (historyIdx < cmdHistory.length - 1) {
                historyIdx++;
                input.value = cmdHistory[cmdHistory.length - 1 - historyIdx];
            }
        } else if (e.key === "ArrowDown") {
            e.preventDefault();
            if (historyIdx > 0) {
                historyIdx--;
                input.value = cmdHistory[cmdHistory.length - 1 - historyIdx];
            } else {
                historyIdx = -1;
                input.value = "";
            }
        }
    });

    // Focus automatique sur l'input
    input.focus();
});

function sendCommand() {
    const input = document.getElementById("termInput");
    const cmd   = input.value;
    if (!cmd) return;

    // Ajouter à l'historique
    if (cmdHistory[cmdHistory.length - 1] !== cmd) {
        cmdHistory.push(cmd);
    }
    historyIdx = -1;

    // Envoyer au terminal actif
    const room = `${serial}_${activeTab}`;
    socket.emit("terminal_input", { room, data: cmd + "\r\n" });

    // Afficher dans xterm
    terminals[activeTab]?.term.writeln(`\x1b[90m› ${cmd}\x1b[0m`);

    input.value = "";
    input.focus();
}

// ── init ──────────────────────────────────────────
async function init() {
    try {
        const res = await fetch(`/api/terminal-info/${serial}`);
        info = await res.json();
    } catch(e) {
        document.getElementById("termLabel").innerText = "Error: " + e.message;
        return;
    }

    if (info.error) {
        document.getElementById("termLabel").innerText = "Error: " + info.error;
        return;
    }

    document.getElementById("termSerial").innerText =
        info.serial + (info.nickname ? ` — ${info.nickname}` : "");
    document.getElementById("termLabel").innerText = info.label || "";

    if (info.tty) {
        // USB TTY — VCOM only, no ADMIN
        document.getElementById("termHost").innerText = `TTY: ${info.tty}`;
        document.getElementById("tabAdmin").style.display = "none";
        createTerminalTTY("vcom", "paneVcom", info.tty);
    } else {
        // Network (ethernet/IP)
        document.getElementById("termHost").innerText =
            `${info.host}  VCOM:${info.vcom}  ADMIN:${info.admin}`;
        createTerminal("vcom",  "paneVcom",  info.host, info.vcom);
        createTerminal("admin", "paneAdmin", info.host, info.admin);
    }
}


// ── terminal factory ──────────────────────────────
function termConfig() {
    return {
        fontFamily:  "'IBM Plex Mono', monospace",
        fontSize:    13,
        scrollback:  300,
        theme: {
            background: "#1a1a1a",
            foreground: "#f4f3f0",
            cursor:     "#1D9E75",
            selection:  "#ffffff33",
        },
        cursorBlink: true,
    };
}

function fitTerm(term, pane) {
    const lineHeight = Math.ceil(term.options.fontSize * 1.5);
    const cols = Math.max(40, Math.floor((pane.clientWidth  - 16) / (term.options.fontSize * 0.6)));
    const rows = Math.max(10, Math.floor((pane.clientHeight - 16) / lineHeight));
    term.resize(cols, rows);
}

function createTerminal(kind, paneId, host, port) {
    const pane = document.getElementById(paneId);
    const term = new Terminal(termConfig());
    term.open(pane);
    fitTerm(term, pane);
    terminals[kind] = { term, pane };

    const room = `${serial}_${kind}`;
    setStatus(kind, "connecting");
    term.writeln(`\x1b[33mConnecting to ${host}:${port}…\x1b[0m`);

    if (socket.connected) {
        socket.emit("connect_telnet", { room, host, port: String(port) });
    } else {
        socket.once("connect", () => socket.emit("connect_telnet", { room, host, port: String(port) }));
    }

    term.onData(data => {
        const out = data.replace(/\r/g, "\r\n");
        socket.emit("terminal_input", { room, data: out });
    });
}

function createTerminalTTY(kind, paneId, tty) {
    const pane = document.getElementById(paneId);
    const term = new Terminal(termConfig());
    term.open(pane);
    fitTerm(term, pane);
    terminals[kind] = { term, pane };

    const room = `${serial}_${kind}`;
    setStatus(kind, "connecting");
    term.writeln(`\x1b[33mConnecting to TTY ${tty}…\x1b[0m`);

    if (socket.connected) {
        socket.emit("connect_tty", { room, tty });
    } else {
        socket.once("connect", () => socket.emit("connect_tty", { room, tty }));
    }

    term.onData(data => socket.emit("terminal_input", { room, data }));
}
// ── socket events ─────────────────────────────────
socket.on("terminal_ready", ({ room }) => {
    const kind = room.split("_").pop();
    setStatus(kind, "connected");
    terminals[kind]?.term.writeln("\x1b[32mConnected.\x1b[0m");
});

socket.on("terminal_output", ({ data, room }) => {
    const kind = room.split("_").pop();
    terminals[kind]?.term.write(data);
});

socket.on("terminal_closed", ({ room }) => {
    const kind = room ? room.split("_").pop() : activeTab;
    terminals[kind]?.term.writeln("\x1b[31m\r\nConnection closed.\x1b[0m");
    setStatus(kind, "error");
});

socket.on("terminal_error", ({ message }) => {
    terminals[activeTab]?.term.writeln(`\x1b[31mError: ${message}\x1b[0m`);
    setStatus(activeTab, "error");
});

// ── tabs ──────────────────────────────────────────
function switchTab(kind) {
    activeTab = kind;
    document.querySelectorAll(".term-tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".term-pane").forEach(p => p.classList.remove("active"));
    document.getElementById(`tab${cap(kind)}`).classList.add("active");
    document.getElementById(`pane${cap(kind)}`).classList.add("active");
    const t = terminals[kind];
    if (t) {
        setTimeout(() => fitTerm(t.term, t.pane), 50);
        t.term.focus();
    }
}

// ── status dots ───────────────────────────────────
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function setStatus(kind, state) {
    const el = document.getElementById(`status${cap(kind)}`);
    if (el) el.className = `term-tab-status ${state}`;

    // Afficher la barre d'actions si admin est connecté
    if (kind === "admin") {
        const bar = document.getElementById("termActionBar");
        if (bar) bar.style.display = state === "connected" ? "flex" : "none";
    }
}

async function termCmd(cmd) {
    const room = `${serial}_admin`;
    terminals["admin"]?.term.writeln(`\x1b[38;5;244m${cmd}\x1b[0m`);
    socket.emit("terminal_input", { room, data: cmd + "\r\n" });
}

async function termPb(pb) {
    const btns = document.querySelectorAll(".term-action-btn");
    btns.forEach(b => b.disabled = true);

    await termCmd(`target button press ${pb}`);
    await new Promise(r => setTimeout(r, 100));
    await termCmd(`target button release ${pb}`);

    btns.forEach(b => b.disabled = false);
}
// ── resize ────────────────────────────────────────
window.addEventListener("resize", () => {
    const t = terminals[activeTab];
    if (t) fitTerm(t.term, t.pane);
});

// ── start ─────────────────────────────────────────
if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
} else {
    init();
}

</script>
</body>
</html>
