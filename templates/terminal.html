<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/xterm.min.css">
<script src="/static/xterm.min.js"></script>
<script src="/static/socket.io.min.js"></script>
<!-- Plotly: pinned version required (plotly-latest is frozen at v1.58.5).
     To vendor locally, drop the file in static/ and point src there. -->
<script src="/static/plotly-3.6.0.min.js" charset="utf-8"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: #EFF2F9;
    color: #4a5a68;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ── header ── */
.term-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: #EFF2F9;
    flex-shrink: 0;
}
.term-serial {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: #4a5a68;
}
.term-label { font-size: 11px; color: #8899aa; }
.term-host {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #1D9E75;
    margin-left: auto;
}

/* ── tabs ── */
.term-tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 0 16px 10px;
    background: #EFF2F9;
    flex-shrink: 0;
}
.term-tab {
    padding: 6px 20px;
    font-size: 12px;
    font-weight: 500;
    color: #6E7F8D;
    cursor: pointer;
    border-radius: 10px;
    border: none;
    background: #EFF2F9;
    transition: box-shadow .2s, color .2s;
    user-select: none;
    box-shadow:
        -4px -4px 8px rgba(250, 251, 255, 1),
         4px  4px 8px rgba(22, 27, 29, 0.23);
}
.term-tab:hover { color: #4a5a68; }
.term-tab.active {
    color: #4a5a68;
    box-shadow:
        inset -4px -4px 8px rgba(250, 251, 255, 1),
        inset  4px  4px 8px rgba(22, 27, 29, 0.23);
}

.term-tab-status {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #b5bfc6;
    margin-right: 6px;
    vertical-align: middle;
}
.term-tab-status.connected  { background: #1D9E75; }
.term-tab-status.error      { background: #E24B4A; }
.term-tab-status.connecting { background: #EF9F27; }

/* ── terminal panes ── */
.term-panes {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    padding: 0 16px;
}
.term-pane {
    flex: 1;
    display: none;
    min-height: 0;
    /* wrapper: rounded corners + neumorphic shadow + padding */
    border-radius: 14px;
    box-shadow:
        inset -4px -4px 8px rgba(250, 251, 255, 1),
        inset  4px  4px 8px rgba(22, 27, 29, 0.18);
    overflow: hidden;
    padding: 8px 0 8px;
    background: #1a1a1a;
    box-sizing: border-box;
}
.term-pane.active { display: flex; flex-direction: column; }

/* xterm fills the padded inner area exactly */
.term-pane .xterm          { flex: 1; min-height: 0; overflow: hidden; }
.term-pane .xterm-viewport { overflow-y: scroll !important; }

/* scrollbar */
.term-pane .xterm-viewport::-webkit-scrollbar       { width: 6px; }
.term-pane .xterm-viewport::-webkit-scrollbar-track { background: transparent; }
.term-pane .xterm-viewport::-webkit-scrollbar-thumb { background: #b5bfc6; border-radius: 3px; }
.term-pane .xterm-viewport::-webkit-scrollbar-thumb:hover { background: #6E7F8D; }


/* ── modern view ── */
.term-modern {
    flex: 1;
    min-height: 0;
    display: none;
    flex-direction: column;
    overflow-y: auto;
    padding: 12px 16px;
    background: #EFF2F9;
    gap: 2px;
}
.term-modern.active { display: flex; }
.term-modern::-webkit-scrollbar { width: 5px; }
.term-modern::-webkit-scrollbar-thumb { background: #b5bfc6; border-radius: 3px; }

/* ── graph view (Plotly, script-driven) ── */
.term-graph {
    flex: 1;
    min-height: 0;
    display: none;
    flex-direction: column;
    border-radius: 14px;
    box-shadow:
        inset -4px -4px 8px rgba(250, 251, 255, 1),
        inset  4px  4px 8px rgba(22, 27, 29, 0.10);
    background: #EFF2F9;
    padding: 10px;
    overflow: hidden;
}
.term-graph.active { display: flex; }
.term-graph .graph-canvas { flex: 1; min-height: 0; }
.term-graph .graph-empty {
    flex: 1; min-height: 0;
    display: flex; align-items: center; justify-content: center;
    color: #9aa7b2; font-size: 12px;
}

/* JSON dashboard view (script-driven controls + one or more Plotly panels) */
.graph-dashboard {
    flex: 1;
    min-height: 0;
    display: none;
    flex-direction: column;
    gap: 10px;
    overflow: hidden;
}
.graph-dashboard-title {
    font-size: 13px;
    font-weight: 500;
    color: #4a5a68;
    flex-shrink: 0;
}
.graph-dashboard-row {
    display: flex;
    gap: 10px;
    min-height: 0;
}
.graph-card {
    background: #EFF2F9;
    border-radius: 12px;
    padding: 10px;
    box-shadow:
        -3px -3px 6px rgba(250,251,255,1),
         3px  3px 6px rgba(22,27,29,0.12);
    min-width: 0;
}
.graph-card-title {
    font-size: 12px;
    font-weight: 500;
    color: #4a5a68;
    margin-bottom: 8px;
}
.graph-control-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
}
.graph-control {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #4a5a68;
}
.graph-control input,
.graph-control select,
.graph-control button {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
}
.graph-control input[type="number"] {
    width: 82px;
}
.graph-control button {
    border: none;
    border-radius: 8px;
    padding: 6px 10px;
    background: #EFF2F9;
    color: #4a5a68;
    cursor: pointer;
    box-shadow:
        -2px -2px 4px rgba(250,251,255,1),
         2px  2px 4px rgba(22,27,29,0.18);
}
.graph-control button:active {
    box-shadow:
        inset -2px -2px 4px rgba(250,251,255,1),
        inset  2px  2px 4px rgba(22,27,29,0.18);
}
.graph-value {
    font-family: 'IBM Plex Mono', monospace;
    color: #185FA5;
    min-width: 48px;
}

/* timeline spine */
.tm-entry {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    position: relative;
}
.tm-spine {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    width: 12px;
    padding-top: 3px;
}
.tm-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 1.5px solid #8899aa;
    background: #EFF2F9;
}
.tm-line {
    width: 1.5px;
    flex: 1;
    min-height: 8px;
    background: rgba(22,27,29,0.12);
    margin-top: 3px;
}
.tm-time {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: #b5bfc6;
    flex-shrink: 0;
    width: 60px;
    padding-top: 3px;
    text-align: right;
}
.tm-block {
    flex: 1;
    min-width: 0;
    margin-bottom: 6px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow:
        -3px -3px 6px rgba(250,251,255,1),
         3px  3px 6px rgba(22,27,29,0.15);
    cursor: pointer;
    transition: box-shadow .15s;
}
.tm-block:hover {
    box-shadow:
        -3px -3px 6px rgba(250,251,255,1),
         4px  4px 8px rgba(22,27,29,0.22);
}

/* status block (connected/disconnected) */
.tm-block-status {
    padding: 5px 12px;
    font-size: 10px;
    color: #8899aa;
    font-style: italic;
    cursor: default;
    border-radius: 8px;
    background: #EFF2F9;
    box-shadow: none;
}

/* command block */
.tm-block-cmd .tm-block-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    background: #EFF2F9;
}
.tm-block-cmd .tm-icon { font-size: 10px; color: #185FA5; flex-shrink: 0; }
.tm-block-cmd .tm-summary {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #185FA5;
    font-weight: 500;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.tm-block-cmd .tm-arrow {
    font-size: 9px;
    color: #b5bfc6;
    flex-shrink: 0;
    transition: transform .2s;
}
.tm-block-cmd.expanded .tm-arrow { transform: rotate(90deg); }
.tm-block-cmd .tm-response {
    display: none;
    padding: 6px 12px 8px;
    border-top: 1px solid rgba(22,27,29,0.07);
    background: #e8ecf5;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: #4a5a68;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 300px;
    overflow-y: auto;
}
.tm-block-cmd.expanded .tm-response { display: block; }

/* event block */
.tm-block-event .tm-block-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    background: #EFF2F9;
}
.tm-block-event .tm-icon { font-size: 10px; color: #EF9F27; flex-shrink: 0; }
.tm-block-event .tm-summary {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: #6E7F8D;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.tm-block-event .tm-arrow {
    font-size: 9px;
    color: #b5bfc6;
    transition: transform .2s;
}
.tm-block-event.expanded .tm-arrow { transform: rotate(90deg); }
.tm-block-event .tm-detail {
    display: none;
    padding: 6px 12px 8px;
    border-top: 1px solid rgba(22,27,29,0.07);
    background: #fdf4e8;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: #6E7F8D;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 200px;
    overflow-y: auto;
}
.tm-block-event.expanded .tm-detail { display: block; }

/* response block — indented right */
.tm-entry-response {
    padding-left: 32px;
}
.tm-spine-resp { opacity: 0.4; }
.tm-dot-resp {
    width: 6px; height: 6px;
    border-color: #6E7F8D;
    background: #EFF2F9;
}
.tm-block-resp {
    flex: 1;
    min-width: 0;
    margin-bottom: 6px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow:
        -2px -2px 5px rgba(250,251,255,1),
         2px  2px 5px rgba(22,27,29,0.12);
    cursor: pointer;
    transition: box-shadow .15s;
}
.tm-block-resp.single { cursor: default; }
.tm-block-resp .tm-block-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: #e8ecf5;
}
.tm-icon-resp { font-size: 10px; color: #6E7F8D; flex-shrink: 0; }
.tm-resp-summary {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: #4a5a68;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.tm-block-resp.expanded .tm-arrow { transform: rotate(90deg); }
.tm-block-resp .tm-arrow {
    font-size: 9px;
    color: #b5bfc6;
    flex-shrink: 0;
    transition: transform .2s;
}
.tm-block-resp .tm-response {
    display: none;
    padding: 6px 12px 8px;
    border-top: 1px solid rgba(22,27,29,0.07);
    background: #dde3f0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: #4a5a68;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 300px;
    overflow-y: auto;
}
.tm-block-resp.expanded .tm-response { display: block; }

/* dot colors */
.tm-dot-cmd    { border-color: #185FA5; background: #EFF2F9; }
.tm-dot-event  { border-color: #EF9F27; background: #EFF2F9; }
.tm-dot-status { border-color: #1D9E75; background: #1D9E75; }

/* Timeline icon — replaces empty circle dot for group/event entries */
.tm-dot-icon {
    width: 16px; height: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; line-height: 1; flex-shrink: 0;
}

/* Group block header background by color category */
.tm-block-event.color-boot   .tm-block-header { background: #FCE7F3; }
.tm-block-event.color-script .tm-block-header { background: #DBEAFE; }
.tm-block-event.color-error  .tm-block-header { background: #FEE2E2; }
.tm-block-event.color-warning .tm-block-header { background: #FEF3C7; }
.tm-block-event.color-success .tm-block-header { background: #D1FAE5; }
.tm-block-event.color-boot   .tm-detail { background: #FDF2F8; }
.tm-block-event.color-script .tm-detail { background: #EFF6FF; }
.tm-block-event.color-error  .tm-detail { background: #FEF2F2; }

/* view toggle button */
.term-view-toggle {
    font-size: 10px;
    padding: 3px 10px;
    height: 22px;
    border-radius: 6px;
    margin-left: auto;
    cursor: pointer;
    background: #EFF2F9;
    color: #8899aa;
    border: none;
    box-shadow:
        -2px -2px 4px rgba(250,251,255,1),
         2px  2px 4px rgba(22,27,29,0.18);
    font-family: 'IBM Plex Mono', monospace;
    transition: box-shadow .15s, color .15s;
}
.term-view-toggle:hover { color: #4a5a68; }
.term-view-toggle.active {
    box-shadow:
        inset -2px -2px 4px rgba(250,251,255,1),
        inset  2px  2px 4px rgba(22,27,29,0.18);
    color: #185FA5;
}

/* ── action bar (Reset/PB/Script) ── */
.term-action-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px 8px;
    background: #EFF2F9;
    flex-shrink: 0;
}
.term-action-sep {
    width: 1px;
    height: 20px;
    background: rgba(22,27,29,0.12);
    flex-shrink: 0;
}
.term-script-name {
    flex: 1;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: #8899aa;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.term-run-btn {
    background: #1D9E75 !important;
    color: white !important;
}
.term-run-btn:disabled {
    background: #EFF2F9 !important;
    color: #b5bfc6 !important;
    opacity: 1 !important;
}
.term-action-btn {
    height: 32px;
    width: 80px;
    border-radius: 10px;
    border: none;
    background: #EFF2F9;
    color: #6E7F8D;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: box-shadow .15s, color .15s;
    box-shadow:
        -4px -4px 8px rgba(250, 251, 255, 1),
         4px  4px 8px rgba(22, 27, 29, 0.23);
}
.term-action-btn:hover  { color: #4a5a68; }
.term-action-btn:active {
    color: #4a5a68;
    box-shadow:
        inset -4px -4px 8px rgba(250, 251, 255, 1),
        inset  4px  4px 8px rgba(22, 27, 29, 0.23);
}
.term-action-btn:disabled { opacity: .4; pointer-events: none; }

/* ── input bar ── */
.term-input-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 16px 10px;
    background: #EFF2F9;
    flex-shrink: 0;
}
.term-prompt {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    color: #1D9E75;
    flex-shrink: 0;
}
.term-input {
    flex: 1;
    height: 34px;
    padding: 0 12px;
    background: #EFF2F9;
    border: none;
    border-radius: 10px;
    outline: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: #4a5a68;
    caret-color: #1D9E75;
    box-shadow:
        inset -3px -3px 6px rgba(250, 251, 255, 1),
        inset  3px  3px 6px rgba(22, 27, 29, 0.18);
}
.term-input::placeholder { color: #b5bfc6; }
.term-send-btn {
    width: 34px; height: 34px;
    padding: 0;
    border-radius: 10px;
    border: none;
    background: #EFF2F9;
    color: #6E7F8D;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: box-shadow .15s, color .15s;
    box-shadow:
        -3px -3px 6px rgba(250, 251, 255, 1),
         3px  3px 6px rgba(22, 27, 29, 0.23);
}
.term-send-btn:hover { color: #4a5a68; }
.term-send-btn:active {
    box-shadow:
        inset -3px -3px 6px rgba(250, 251, 255, 1),
        inset  3px  3px 6px rgba(22, 27, 29, 0.23);
}
</style>
</head>
<body>

<div class="term-header">
    <div>
        <div class="term-serial" id="termSerial">—</div>
        <div class="term-label"  id="termLabel">Loading…</div>
    </div>
    <div class="term-host" id="termHost">—</div>
</div>

<div class="term-tabs">
    <div class="term-tab active" id="tabVcom"  onclick="switchTab('vcom')">
        <span class="term-tab-status connecting" id="statusVcom"></span>VCOM
    </div>
    <div class="term-tab" id="tabGraph" onclick="showGraph()">📈 Graph</div>
</div>

<div class="term-panes">
    <div class="term-pane active" id="paneVcom"></div>
    <div class="term-modern"      id="modernVcom"></div>
    <div class="term-graph" id="paneGraph">
        <div class="graph-empty" id="graphEmpty">En attente de données du script…</div>
        <div class="graph-dashboard" id="graphDashboard" style="display:none"></div>
        <div class="graph-canvas" id="graphPlot" style="display:none"></div>
    </div>
</div>

<div class="term-input-bar">
    <span class="term-prompt">›</span>
    <input type="text" id="termInput" class="term-input" 
           placeholder="Type command…" autocomplete="off" spellcheck="false"/>
    <button class="term-send-btn" onclick="sendCommand()">⏎</button>
</div>

<div class="term-action-bar" id="termActionBar">
    <button class="term-action-btn" id="termResetBtn" onclick="resetMcu()">⟲ Reset MCU</button>
    <button class="term-action-btn" onclick="pickScript()">📁 Script</button>
    <span class="term-script-name" id="termScriptName">no script selected</span>
    <button class="term-action-btn term-run-btn" id="termRunBtn" onclick="runScript()" disabled>▶ Run</button>
</div>

<script>
const serial    = location.pathname.split("/").filter(p => p.length > 0).pop();
const socket    = io();

socket.on("connect", () => {
    console.log("socket connected:", socket.id);
});
socket.on("connect_error", (e) => {
    console.error("socket error:", e);
});
socket.on("terminal_echo", ({ data, room }) => {
    const kind = room.split("_").pop();
    terminals[kind]?.term.writeln(`\x1b[38;5;244m${data}\x1b[0m`);
});
let info        = null;
let terminals   = {};
let activeTab   = "vcom";

// ── historique des commandes ──────────────────────
const cmdHistory = [];
let historyIdx   = -1;

document.addEventListener("DOMContentLoaded", () => {
    const input = document.getElementById("termInput");
    if (!input) return;

    input.addEventListener("keydown", e => {
        if (e.key === "Enter") {
            sendCommand();
        } else if (e.key === "ArrowUp") {
            e.preventDefault();
            if (historyIdx < cmdHistory.length - 1) {
                historyIdx++;
                input.value = cmdHistory[cmdHistory.length - 1 - historyIdx];
            }
        } else if (e.key === "ArrowDown") {
            e.preventDefault();
            if (historyIdx > 0) {
                historyIdx--;
                input.value = cmdHistory[cmdHistory.length - 1 - historyIdx];
            } else {
                historyIdx = -1;
                input.value = "";
            }
        }
    });

    // Focus automatique sur l'input
    input.focus();
});

function sendCommand() {
    const input = document.getElementById("termInput");
    const cmd   = input.value;
    if (!cmd) return;

    // Ajouter à l'historique
    if (cmdHistory[cmdHistory.length - 1] !== cmd) {
        cmdHistory.push(cmd);
    }
    historyIdx = -1;

    // Envoyer au terminal actif
    const room = `${serial}_${activeTab}`;
    socket.emit("terminal_input", { room, data: cmd + "\r\n" });

    // Afficher dans xterm
    terminals[activeTab]?.term.writeln(`\x1b[90m› ${cmd}\x1b[0m`);
    mvFeed(activeTab, `> ${cmd}\n`);

    input.value = "";
    input.focus();
}

// ── init ──────────────────────────────────────────
async function init() {
    try {
        const res = await fetch(`/api/terminal-info/${serial}`);
        info = await res.json();
    } catch(e) {
        document.getElementById("termLabel").innerText = "Error: " + e.message;
        return;
    }

    if (info.error) {
        // No VCOM port AND no usable TTY — show the reason (+ manual button
        // if a candidate exists).
        showEndpointError(info.error, info.tty_candidate);
        return;
    }

    document.getElementById("termSerial").innerText =
        info.serial + (info.nickname ? ` — ${info.nickname}` : "");
    document.getElementById("termLabel").innerText = info.label || "";

    // VCOM only — ADMIN is intentionally not displayed.
    // Transport is chosen by what terminal-info returned:
    //   - vcom port present  -> TCP socket (USB 127.0.0.1 / IP)
    //   - else tty present   -> raw serial /dev/tty (USB fallback)
    if (info.vcom != null) {
        document.getElementById("termHost").innerText =
            `${info.host}  VCOM:${info.vcom}`;
        createTerminal("vcom", "paneVcom", info.host, info.vcom);
    } else if (info.tty) {
        document.getElementById("termHost").innerText = `VCOM (TTY): ${info.tty}`;
        createTerminalTTY("vcom", "paneVcom", info.tty);
    } else {
        showEndpointError("Aucun port VCOM ni TTY disponible.", null);
        return;
    }
    applyView();
}

// Endpoint resolution failed (no VCOM endpoint). Never auto-connect TTY:
// show the reason and, for USB, a button the user can press deliberately.
function showEndpointError(msg, ttyCandidate) {
    document.getElementById("termLabel").innerText = "Connexion indisponible";
    document.getElementById("termHost").innerText = msg;
    let html =
        '<div style="padding:18px;color:#f4f3f0;font:13px/1.6 monospace">' +
        '<div style="color:#e0654f;margin-bottom:12px">⚠ ' + msg + '</div>';
    if (ttyCandidate) {
        html +=
            '<div style="margin-bottom:10px;opacity:.85">Repli série brute possible :</div>' +
            '<button onclick="connectTTYFallback(\'' + ttyCandidate + '\')" ' +
            'style="padding:7px 16px;border:0;border-radius:6px;background:#1D9E75;' +
            'color:#fff;cursor:pointer;font:13px monospace">' +
            'Connecter en TTY : ' + ttyCandidate + '</button>';
    } else {
        html += '<div style="opacity:.7">Aucun repli TTY pour cette carte.</div>';
    }
    html += '</div>';
    document.getElementById("paneVcom").innerHTML = html;
}

// Triggered ONLY by the user clicking the fallback button above.
function connectTTYFallback(tty) {
    document.getElementById("paneVcom").innerHTML = "";
    document.getElementById("termHost").innerText = `TTY (secours) : ${tty}`;
    createTerminalTTY("vcom", "paneVcom", tty);
    applyView();
}


// ── terminal factory ──────────────────────────────
function termConfig() {
    return {
        fontFamily:  "'IBM Plex Mono', monospace",
        fontSize:    13,
        scrollback:  300,
        theme: {
            background: "#1a1a1a",
            foreground: "#f4f3f0",
            cursor:     "#1D9E75",
            selection:  "#ffffff33",
        },
        cursorBlink: true,
    };
}

function fitTerm(term, pane) {
    const rect = pane.getBoundingClientRect();
    const W = rect.width;
    const H = rect.height - 16; // subtract top+bottom padding (8+8)
    if (!W || !H) return;
    const core  = term._core;
    const dims  = core && core._renderService && core._renderService.dimensions;
    const charW = dims ? dims.css.cell.width  : term.options.fontSize * 0.601;
    const charH = dims ? dims.css.cell.height : term.options.fontSize * 1.5;
    if (!charW || !charH) return;
    const cols = Math.max(40, Math.floor(W / charW));
    const rows = Math.max(8,  Math.ceil(H / charH));  // ceil fills to bottom
    if (term.cols !== cols || term.rows !== rows) {
        term.resize(cols, rows);
    }
}

function attachFit(term, pane) {
    requestAnimationFrame(() => requestAnimationFrame(() => fitTerm(term, pane)));
    if (window.ResizeObserver) {
        new ResizeObserver(() => fitTerm(term, pane)).observe(pane);
    }
}

function createTerminal(kind, paneId, host, port) {
    const pane = document.getElementById(paneId);
    const term = new Terminal(termConfig());
    term.open(pane);
    terminals[kind] = { term, pane, host, port };
    attachFit(term, pane);

    const room = `${serial}_${kind}`;
    setStatus(kind, "connecting");
    term.writeln(`\x1b[33mConnecting to ${host}:${port}…\x1b[0m`);

    if (socket.connected) {
        socket.emit("connect_telnet", { room, host, port: String(port) });
    } else {
        socket.once("connect", () => socket.emit("connect_telnet", { room, host, port: String(port) }));
    }

    term.onData(data => {
        const out = data.replace(/\r/g, "\r\n");
        socket.emit("terminal_input", { room, data: out });
    });
}

function createTerminalTTY(kind, paneId, tty) {
    const pane = document.getElementById(paneId);
    const term = new Terminal(termConfig());
    term.open(pane);
    terminals[kind] = { term, pane };
    attachFit(term, pane);

    const room = `${serial}_${kind}`;
    setStatus(kind, "connecting");
    term.writeln(`\x1b[33mConnecting to TTY ${tty}…\x1b[0m`);

    if (socket.connected) {
        socket.emit("connect_tty", { room, tty });
    } else {
        socket.once("connect", () => socket.emit("connect_tty", { room, tty }));
    }

    term.onData(data => socket.emit("terminal_input", { room, data }));
}
// ── socket events ─────────────────────────────────
socket.on("terminal_ready", ({ room }) => {
    const kind = room.split("_").pop();
    if (terminals[kind]) terminals[kind].reconnecting = false;
    setStatus(kind, "connected");
    terminals[kind]?.term.writeln("\x1b[32mConnected.\x1b[0m");
    mvAddStatus(kind, "Connected");
});

socket.on("terminal_output", ({ data, room }) => {
    // Raw data for xterm (Classic mode only)
    const kind = room.split("_").pop();
    terminals[kind]?.term.write(data);
});

socket.on("terminal_closed", ({ room }) => {
    const kind = room ? room.split("_").pop() : activeTab;
    terminals[kind]?.term.writeln("\x1b[31m\r\nConnection closed.\x1b[0m");
    setStatus(kind, "error");
    mvAddStatus(kind, "Connection closed");
});

socket.on("terminal_error", ({ message }) => {
    terminals[activeTab]?.term.writeln(`\x1b[31mError: ${message}\x1b[0m`);
    setStatus(activeTab, "error");
});

// ── Plotly "Graph" view ──────────────────────────
// Fully script-driven. Supports two modes:
//   1) legacy single Plotly figure: board.plot.show({data, layout, config})
//   2) JSON dashboard: board.plot.dashboard({kind:"dashboard", layout:[...]})
// Dashboard controls can emit CLI commands through the existing terminal_input path.
var graphMode   = false;
var graphInited = false;
var graphDiv    = null;
var dashboardPlots = {};
var dashboardActivePlot = null;

function ensureGraphDiv() {
    if (!graphDiv) graphDiv = document.getElementById("graphPlot");
    return graphDiv;
}
function graphEmptyEl() { return document.getElementById("graphEmpty"); }
function graphDashboardEl() { return document.getElementById("graphDashboard"); }
function graphRevealLegacy() {
    graphEmptyEl().style.display = "none";
    graphDashboardEl().style.display = "none";
    ensureGraphDiv().style.display = "block";
}
function graphRevealDashboard() {
    graphEmptyEl().style.display = "none";
    ensureGraphDiv().style.display = "none";
    graphDashboardEl().style.display = "flex";
}
function resizeAllGraphs() {
    if (!window.Plotly || !graphInited) return;
    if (Object.keys(dashboardPlots).length) {
        Object.values(dashboardPlots).forEach(function (gd) { Plotly.Plots.resize(gd); });
    } else {
        Plotly.Plots.resize(ensureGraphDiv());
    }
}

socket.on("plot_figure", function (spec) {
    if (!window.Plotly) return;

    if (spec && spec.kind === "dashboard") {
        renderGraphDashboard(spec);
        return;
    }

    var gd = ensureGraphDiv();
    graphRevealLegacy();
    dashboardPlots = {};
    dashboardActivePlot = gd;

    Plotly.react(gd, spec.data || [], spec.layout || {},
                 spec.config || { responsive: true, displaylogo: false });
    graphInited = true;
    if (graphMode) Plotly.Plots.resize(gd);
});

socket.on("plot_extend", function (d) {
    if (!window.Plotly || !graphInited) return;

    var gd = null;
    if (d.target && dashboardPlots[d.target]) {
        gd = dashboardPlots[d.target];
    } else if (dashboardActivePlot) {
        gd = dashboardActivePlot;
    } else {
        gd = ensureGraphDiv();
    }
    if (!gd) return;

    var update = { y: d.ys.map(function (v) { return [v]; }) };
    if (d.x !== null && d.x !== undefined) {
        update.x = d.traces.map(function () { return [d.x]; });
    }
    var max = (d.maxpoints === null || d.maxpoints === undefined) ? undefined : d.maxpoints;
    Plotly.extendTraces(gd, update, d.traces, max);

    // Optional moving x-axis viewport. Use board.plot.extend(..., window_s=60).
    if (d.window_s && d.x !== null && d.x !== undefined) {
        Plotly.relayout(gd, {
            "xaxis.range": [Math.max(0, d.x - d.window_s), Math.max(d.window_s, d.x)]
        });
    }
});

socket.on("plot_clear", function () {
    if (!window.Plotly) return;
    Plotly.purge(ensureGraphDiv());
    Object.values(dashboardPlots).forEach(function (gd) { Plotly.purge(gd); });
    dashboardPlots = {};
    dashboardActivePlot = null;
    graphInited = false;
    ensureGraphDiv().style.display = "none";
    graphDashboardEl().style.display = "none";
    graphEmptyEl().style.display = "flex";
});

function renderGraphDashboard(spec) {
    graphRevealDashboard();

    var root = graphDashboardEl();
    root.innerHTML = "";
    dashboardPlots = {};
    dashboardActivePlot = null;

    if (spec.title) {
        var title = document.createElement("div");
        title.className = "graph-dashboard-title";
        title.textContent = spec.title;
        root.appendChild(title);
    }

    for (const block of spec.layout || []) {
        if (block.type === "row") {
            root.appendChild(renderDashboardRow(block));
        } else {
            root.appendChild(renderDashboardBlock(block));
        }
    }

    graphInited = true;
    if (graphMode) setTimeout(resizeAllGraphs, 50);
}

function renderDashboardRow(row) {
    var div = document.createElement("div");
    div.className = "graph-dashboard-row";
    div.style.flex = row.flex || "0 0 auto";

    for (const child of row.children || []) {
        var childEl = renderDashboardBlock(child);
        childEl.style.flex = child.flex || "1";
        div.appendChild(childEl);
    }
    return div;
}

function renderDashboardBlock(block) {
    if (block.type === "controls") return renderControlBlock(block);
    if (block.type === "plotly") return renderPlotlyBlock(block);
    if (block.type === "text") return renderTextBlock(block);

    var unknown = document.createElement("div");
    unknown.className = "graph-card";
    unknown.textContent = "Unknown dashboard block: " + block.type;
    return unknown;
}

function renderTextBlock(block) {
    var card = document.createElement("div");
    card.className = "graph-card";
    card.id = "dash-" + block.id;
    card.style.flex = block.flex || "0 0 auto";
    card.textContent = block.text || "";
    return card;
}

function renderControlBlock(block) {
    var card = document.createElement("div");
    card.className = "graph-card";
    card.style.flex = block.flex || "0 0 auto";

    if (block.title) {
        var title = document.createElement("div");
        title.className = "graph-card-title";
        title.textContent = block.title;
        card.appendChild(title);
    }

    var grid = document.createElement("div");
    grid.className = "graph-control-grid";
    for (const control of block.controls || []) grid.appendChild(renderControl(control));
    card.appendChild(grid);
    return card;
}

function renderControl(control) {
    var wrap = document.createElement("label");
    wrap.className = "graph-control";

    if (control.type !== "button") {
        var label = document.createElement("span");
        label.textContent = control.label || control.id || "";
        wrap.appendChild(label);
    }

    if (control.type === "button") {
        var btn = document.createElement("button");
        btn.textContent = control.label || control.id || "Button";
        btn.onclick = function () { sendDashboardControl(control, true); };
        wrap.appendChild(btn);
        return wrap;
    }

    if (control.type === "slider") {
        var input = document.createElement("input");
        input.type = "range";
        input.min = control.min;
        input.max = control.max;
        input.step = control.step || 1;
        input.value = control.value;

        var valueLabel = document.createElement("span");
        valueLabel.className = "graph-value";
        valueLabel.textContent = input.value + (control.unit ? " " + control.unit : "");

        input.oninput = function () {
            valueLabel.textContent = input.value + (control.unit ? " " + control.unit : "");
            if (control.send === "input") sendDashboardControl(control, input.value);
        };
        input.onchange = function () { sendDashboardControl(control, input.value); };

        wrap.appendChild(input);
        wrap.appendChild(valueLabel);
        return wrap;
    }

    if (control.type === "number") {
        var number = document.createElement("input");
        number.type = "number";
        number.value = control.value;
        if (control.min !== undefined) number.min = control.min;
        if (control.max !== undefined) number.max = control.max;
        if (control.step !== undefined) number.step = control.step;
        number.onchange = function () { sendDashboardControl(control, number.value); };
        wrap.appendChild(number);
        return wrap;
    }

    if (control.type === "select") {
        var select = document.createElement("select");
        for (const opt of control.options || []) {
            var option = document.createElement("option");
            option.value = opt.value;
            option.textContent = opt.label || opt.value;
            if (opt.value === control.value) option.selected = true;
            select.appendChild(option);
        }
        select.onchange = function () { sendDashboardControl(control, select.value); };
        wrap.appendChild(select);
        return wrap;
    }

    var unknown = document.createElement("span");
    unknown.textContent = "Unsupported control: " + control.type;
    wrap.appendChild(unknown);
    return wrap;
}

function renderPlotlyBlock(block) {
    var card = document.createElement("div");
    card.className = "graph-card";
    card.style.flex = block.flex || "1";
    card.style.minHeight = block.minHeight || "260px";
    card.style.display = "flex";
    card.style.flexDirection = "column";

    if (block.title) {
        var title = document.createElement("div");
        title.className = "graph-card-title";
        title.textContent = block.title;
        card.appendChild(title);
    }

    var div = document.createElement("div");
    div.id = "dash-plot-" + block.id;
    div.style.flex = "1";
    div.style.minHeight = "0";
    card.appendChild(div);

    setTimeout(function () {
        Plotly.react(div,
                    block.figure?.data || [],
                    block.figure?.layout || {},
                    block.figure?.config || { responsive: true, displaylogo: false });
        dashboardPlots[block.id] = div;
        if (!dashboardActivePlot) dashboardActivePlot = div;
        if (graphMode) Plotly.Plots.resize(div);
    }, 0);

    return card;
}

function sendDashboardControl(control, value) {
    var room = `${serial}_vcom`;
    var command = control.command || "";
    command = command.replaceAll("{value}", String(value));

    // Diagnostic event for future server-side code that wants raw UI values.
    socket.emit("plot_control", { room: room, id: control.id, value: value, command: command });

    // Test-vehicle behavior: immediately write the generated command to CLI.
    if (command) {
        socket.emit("terminal_input", { room: room, data: command + "\r\n" });
        terminals["vcom"]?.term.writeln(`\x1b[90m› ${command}\x1b[0m`);
        mvFeed("vcom", `> ${command}\n`);
    }
}

function showGraph() {
    graphMode = true;
    document.querySelectorAll(".term-tab").forEach(function (t) { t.classList.remove("active"); });
    document.getElementById("tabGraph").classList.add("active");
    document.querySelectorAll(".term-pane").forEach(function (p) { p.classList.remove("active"); });
    document.querySelectorAll(".term-modern").forEach(function (p) { p.classList.remove("active"); });
    document.getElementById("paneGraph").classList.add("active");
    if (window.Plotly && graphInited) resizeAllGraphs();
}

function switchTab(kind) {

    }
}

// MCU reset via Commander (pycommander) — independent of the admin console,
// so it works on USB adapters that have no admin CLI.
async function resetMcu() {
    const btn = document.getElementById("termResetBtn");
    const vt  = terminals["vcom"]?.term;
    if (btn) { btn.disabled = true; btn.textContent = "⟲ Reset…"; }
    vt?.writeln("\x1b[38;5;244m[reset MCU via commander]\x1b[0m");
    try {
        const r = await fetch(`/api/adapter/${serial}/reset-mcu`, { method: "POST" });
        const j = await r.json();
        if (j.ok) {
            vt?.writeln("\x1b[38;5;71m[reset OK]\x1b[0m");
        } else {
            vt?.writeln(`\x1b[38;5;167m[reset failed] ${j.msg || j.error || ""}\x1b[0m`);
        }
    } catch (e) {
        vt?.writeln(`\x1b[38;5;167m[reset error] ${e}\x1b[0m`);
    } finally {
        if (btn) { btn.disabled = false; btn.textContent = "⟲ Reset MCU"; }
    }
}

// ══════════════════════════════════════════════════════════════════════
// Modern View — fully server-driven.
// The server emits one self-contained `terminal_block` per command / event /
// boot. The client only appends it to the timeline. No parsing, no state
// machine, no raw→display reconciliation.
// ══════════════════════════════════════════════════════════════════════

function applyView() {
    if (graphMode) return;   // graph view active — leave terminal panes hidden
    if (modernMode) {
        document.querySelectorAll(".term-pane").forEach(p => p.classList.remove("active"));
        document.querySelectorAll(".term-modern").forEach(p => p.classList.remove("active"));
        const m = document.getElementById("modern" + cap(activeTab));
        if (m) m.classList.add("active");
    } else {
        document.querySelectorAll(".term-modern").forEach(p => p.classList.remove("active"));
        document.querySelectorAll(".term-pane").forEach(p => p.classList.remove("active"));
        const p = document.getElementById("pane" + cap(activeTab));
        if (p) p.classList.add("active");
        const t = terminals[activeTab];
        if (t) { setTimeout(() => fitTerm(t.term, t.pane), 50); t.term.focus(); }
    }
}

// Local command echo is now produced server-side (command block) — no-op.
function mvFeed() {}

// ── helpers ──────────────────────────────────────────────────────────
function mvContainer(kind) { return document.getElementById("modern" + cap(kind)); }
function mvAtBottom(c) { return (c.scrollHeight - c.scrollTop - c.clientHeight) < 40; }
function mvBottom(c)   { c.scrollTop = c.scrollHeight; }
function mvTime() {
    const d = new Date();
    return d.toLocaleTimeString("en-GB", { hour12: false }) +
           "." + String(d.getMilliseconds()).padStart(3, "0");
}
function esc(s) {
    return String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
function tmToggle(id) {
    const el = document.getElementById(id);
    if (el) el.classList.toggle("expanded");
}

var _tmSeq = 0;
function _lineColor(color) {
    return ({ error: "#E24B4A", warning: "#C77B12",
              success: "#1D9E75", boot: "#9D2C6B" })[color] || "#4a5a68";
}

// ── status line (Connected / Connection closed) ──────────────────────
function mvAddStatus(kind, msg) {
    if (!modernMode) return;
    const c = mvContainer(kind);
    if (!c) return;
    const atBottom = mvAtBottom(c);
    const e = document.createElement("div");
    e.className = "tm-entry";
    e.innerHTML =
        '<div class="tm-spine"><div class="tm-dot tm-dot-status"></div><div class="tm-line"></div></div>' +
        '<div class="tm-time">' + mvTime() + '</div>' +
        '<div class="tm-block tm-block-status">' + esc(msg) + '</div>';
    c.appendChild(e);
    if (atBottom) mvBottom(c);
}

// ── the one and only block renderer ──────────────────────────────────
function renderBlock(kind, block) {
    const c = mvContainer(kind);
    if (!c) return;
    const atBottom = mvAtBottom(c);
    const id       = "tmb-" + (++_tmSeq);
    const ts       = block.ts || mvTime();
    const lines    = block.lines || [];

    // ── reply: a separate entry, indented to the right under its command ──
    if (block.kind === "response") {
        const multi   = lines.length > 1;
        const summary = esc(block.title) +
            (multi ? '<span style="color:#b5bfc6"> &nbsp;(' + esc(block.subtitle || (lines.length + " lignes")) + ')</span>' : '');
        let detail = "";
        if (multi) {
            detail = '<div class="tm-response">' + lines.map(l => {
                const col = (l.color && l.color !== "default") ? ' style="color:' + _lineColor(l.color) + '"' : '';
                return '<div' + col + '>' + esc(l.text) + '</div>';
            }).join("") + '</div>';
        }
        const click = multi ? ' onclick="tmToggle(\'' + id + '\')"' : '';
        const e = document.createElement("div");
        e.className = "tm-entry tm-entry-response";
        e.innerHTML =
            '<div class="tm-spine tm-spine-resp"><div class="tm-dot tm-dot-resp"></div><div class="tm-line"></div></div>' +
            '<div class="tm-time">' + esc(ts) + '</div>' +
            '<div class="tm-block tm-block-resp' + (multi ? '' : ' single') + '" id="' + id + '"' + click + '>' +
                '<div class="tm-block-header">' +
                    '<span class="tm-icon-resp">↳</span>' +
                    '<span class="tm-resp-summary">' + summary + '</span>' +
                    (multi ? '<span class="tm-arrow">▶</span>' : '') +
                '</div>' + detail +
            '</div>';
        c.appendChild(e);
        if (atBottom) mvBottom(c);
        return;
    }

    const hasDetail = lines.length > 0;
    const arrow     = hasDetail ? '<span class="tm-arrow">▶</span>' : '';
    let dotClass, blockClass, header, detailClass = "tm-detail";

    if (block.kind === "cmd") {
        // command alone — shown immediately, reply will follow indented below
        dotClass   = "tm-dot-cmd";
        blockClass = "tm-block-cmd";
        header = '<span class="tm-icon">›</span>' +
                 '<span class="tm-summary">' + esc(block.title) + '</span>';
    } else if (block.kind === "boot") {
        dotClass   = "tm-dot-event";
        blockClass = "tm-block-event color-boot";
        const sub  = block.subtitle ? '  ' + esc(block.subtitle) : '';
        header = '<span class="tm-icon">↺</span>' +
                 '<span class="tm-summary">' + esc(block.title) + sub + '</span>' + arrow;
    } else { // event
        dotClass   = "tm-dot-event";
        blockClass = "tm-block-event" +
                     (block.color && block.color !== "default" ? " color-" + block.color : "");
        header = '<span class="tm-icon">⚡</span>' +
                 '<span class="tm-summary">' + esc(block.title) + '</span>' + arrow;
    }

    let detailHtml = "";
    if (hasDetail) {
        const body = lines.map(l => {
            const col = (l.color && l.color !== "default")
                ? ' style="color:' + _lineColor(l.color) + '"' : '';
            return '<div' + col + '>' + esc(l.text) + '</div>';
        }).join("");
        detailHtml = '<div class="' + detailClass + '">' + body + '</div>';
    }

    const click = hasDetail ? ' onclick="tmToggle(\'' + id + '\')"' : '';
    const e = document.createElement("div");
    e.className = "tm-entry";
    e.innerHTML =
        '<div class="tm-spine"><div class="tm-dot ' + dotClass + '"></div><div class="tm-line"></div></div>' +
        '<div class="tm-time">' + esc(ts) + '</div>' +
        '<div class="tm-block ' + blockClass + '" id="' + id + '"' + click + '>' +
            '<div class="tm-block-header">' + header + '</div>' +
            detailHtml +
        '</div>';
    c.appendChild(e);
    if (atBottom) mvBottom(c);
}

socket.on("terminal_block", (block) => {
    if (!modernMode) return;
    renderBlock("vcom", block);
});
{% endraw %}
</script>
