<!-- Script Control — unified v2 -->
<style>
/* all styles in style.css */
</style>

<div id="scRunPanel" style="display:none; position:fixed; inset:0; background:rgba(22,27,29,0.35); z-index:200; align-items:flex-start; justify-content:center; padding-top:32px; padding-bottom:32px;">
    <div id="scRunDialog">
        <!-- header -->
        <div class="sc-run-header">
            <span class="sc-panel-title" id="scRunTitle">Run</span>
            <div class="panel-spacer"></div>
            <span id="scRunStatusBadge" class="sc-run-badge"></span>
            <span class="group-close" onclick="closeRunPanel()">✕</span>
        </div>
        <!-- body: left (boards) + right (log) -->
        <div class="sc-run-body">
            <!-- left 1/3 : board mini-cards -->
            <div class="sc-run-left">
                <div class="sc-run-section-title">Boards</div>
                <div id="scRunBoards" class="sc-run-boards-grid"></div>
            </div>
            <!-- right 2/3 : log output -->
            <div class="sc-run-right">
                <div class="sc-run-section-title">Output</div>
                <div id="scRunLog" class="sc-run-log"></div>
            </div>
        </div>
        <!-- footer -->
        <div class="sc-board-form-footer">
            <button class="sc-browse-btn" id="scRunClearBtn" onclick="document.getElementById('scRunLog').innerHTML=''">Clear</button>
            <button class="sc-browse-btn" onclick="closeRunPanel()">Close</button>
        </div>
    </div>
</div>

<!-- ── Toolbar ── -->
<div class="sc2-toolbar">
    <button id="sc2OpenBtn"   onclick="sc2Open()">Open</button>
    <button id="sc2NewBtn"    onclick="sc2New()">New</button>
    <button id="sc2SaveBtn"   onclick="sc2Save()"  disabled>Save</button>
    <button id="sc2SaveAsBtn" onclick="sc2SaveAs()">Save As</button>
    <div class="sc2-sep"></div>
    <button id="sc2CheckBtn"  onclick="sc2Check()" disabled>Check</button>
    <button id="sc2RunBtn"    onclick="sc2Run()"   disabled>Run</button>
</div>

<!-- ── Content panel ── -->
<div class="sc2-panel">

    <!-- File path bar — icon + path on same line -->
    <div class="sc2-path-bar" onclick="sc2ChangeDir()" style="cursor:pointer" title="Click to change directory">
        <span class="sc2-path-icon">📁</span>
        <span class="sc2-path-dir" id="sc2Dir">— no directory —</span>
        <span class="sc2-path-empty" id="sc2Empty" style="color:#b5bfc6; font-style:italic; font-size:11px; margin-left:8px;">Open a scenario or create a new one</span>
    </div>

    <!-- Content action bar -->
    <div class="sc2-action-bar">
        <span class="sc2-scenario-title" id="sc2Title">—</span>
        <div id="sc2BoardActions" style="display:none; align-items:center; gap:8px; flex-shrink:0;">
            <span style="font-size:11px; color:#8899aa;">Add board(s)</span>
            <button class="sc-browse-btn" id="sc2AddBoardBtn" onclick="sc2AddBoard()">Single</button>
            <button class="sc-browse-btn" id="sc2FromGroupBtn" onclick="sc2FromGroup()">From group</button>
        </div>
    </div>

    <!-- Sections body -->
    <div class="sc2-body" id="sc2Body">
        <div style="color:#b5bfc6; font-size:12px; text-align:center; padding:32px 0;">
            Open a .yaml scenario file or create a new one
        </div>
    </div>

    <!-- Check results -->
    <div class="sc2-check-wrap" id="sc2CheckWrap" style="display:none"></div>
</div>

<!-- Group picker — fixed overlay -->
<div id="sc2GroupOverlay" style="display:none; position:fixed; inset:0; background:rgba(22,27,29,0.45); z-index:9999; align-items:center; justify-content:center;" onclick="sc2CloseGroupPicker()">
  <div style="background:#EFF2F9; border-radius:16px; padding:20px 24px; min-width:280px; max-width:380px; box-shadow:0 8px 48px rgba(22,27,29,0.3);" onclick="event.stopPropagation()">
    <div style="font-size:13px; font-weight:600; color:#1a2630; margin-bottom:12px;">Select Group</div>
    <div id="sc2GroupList" style="max-height:240px; overflow-y:auto; display:flex; flex-direction:column; gap:4px;"></div>
    <button onclick="sc2CloseGroupPicker()" style="margin-top:12px; width:100%;">Cancel</button>
  </div>
</div>

<script>
function getSocket() {
    return window._appSocket || (window._appSocket = io());
}

function esc(s) {
    if (s == null) return "";
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── Run panel ──
function openRunPanel(run_id) {
    const panel  = document.getElementById("scRunPanel");
    const log    = document.getElementById("scRunLog");
    const boards = document.getElementById("scRunBoards");
    if (!panel) return;
    log.innerHTML    = "";
    boards.innerHTML = "";

    // header
    const title = document.getElementById("scRunTitle");
    const badge = document.getElementById("scRunStatusBadge");
    if (badge) { badge.innerText = "running"; badge.className = "sc-run-badge"; }
    panel.style.display = "flex";

    // Track board index for display name fallback
    const boardIndex = {};  // serial → display label

    const STATUS_COLOR = {
        pending:    "#b5bfc6",
        erasing:    "#EF9F27",
        flashing:   "#EF9F27",
        connecting: "#7b9ec8",
        ready:      "#7b9ec8",
        running:    "#185FA5",
        done:       "#1D9E75",
        error:      "#E24B4A",
    };

    const sc = getSocket();

    sc.on("run_board_status", ({ serial, status, msg }) => {
        let card = document.getElementById(`run_board_${serial}`);
        if (!card) {
            // First time we see this board — register index
            const idx = Object.keys(boardIndex).length;
            boardIndex[serial] = serial;  // will be overridden by nickname if available
            card = document.createElement("div");
            card.id = `run_board_${serial}`;
            card.className = "sc-run-board-card";
            card.innerHTML = `
                <div class="sc-run-card-top">
                    <span class="sc-run-card-dot" id="dot_${serial}"></span>
                    <span class="sc-run-card-name" id="name_${serial}">${esc(serial)}</span>
                </div>
                <span class="sc-run-card-status" id="st_${serial}"></span>
                <div class="sc-run-card-msg" id="msg_${serial}"></div>`;
            boards.appendChild(card);
        }
        const color = STATUS_COLOR[status] || "#b5bfc6";
        const dot   = document.getElementById(`dot_${serial}`);
        const st    = document.getElementById(`st_${serial}`);
        const msgEl = document.getElementById(`msg_${serial}`);
        if (dot)   dot.style.background = color;
        if (st)    { st.innerText = status; st.style.color = color; }
        if (msgEl) msgEl.innerText = msg || "";
    });

    sc.on("run_output", ({ serial, data, stream }) => {
        const lines = data.split("\n").filter((l, i, a) => !(i === a.length - 1 && l === ""));
        if (!lines.length) return;

        if (stream === "flash") {
            // flash → carte gauche uniquement, sans filename
            const msgEl = document.getElementById(`msg_${serial}`);
            if (msgEl) msgEl.innerText = "";
            return;
        }

        if (stream === "vcom" || stream === "admin") {
            // Raw board exchanges → not shown in output log
            return;
        }

        // Tout le reste → log droit
        let prefix, cls;
        if (serial === "_scenario_") {
            prefix = "[global]";
            cls    = "sc-log-source-global";
        } else {
            const nameEl = document.getElementById(`name_${serial}`);
            const name   = nameEl ? nameEl.innerText : serial;
            prefix = `[board:${name}]`;
            cls    = stream === "error" ? "sc-log-source-error" : "sc-log-source-board";
        }

        const frag = document.createDocumentFragment();
        lines.forEach((line, i) => {
            const div = document.createElement("div");
            if (i === 0) {
                div.innerHTML = `<span class="${cls}">${esc(prefix)}</span> ${esc(line)}`;
            } else {
                div.innerHTML = `<span class="sc-log-indent"></span>${esc(line)}`;
            }
            frag.appendChild(div);
        });
        log.appendChild(frag);
        log.scrollTop = log.scrollHeight;
    });

    sc.on("run_board_nickname", ({ serial, nickname }) => {
        // Backend can emit this to update display name
        const nameEl = document.getElementById(`name_${serial}`);
        if (nameEl) nameEl.innerText = nickname;
    });

    sc.on("run_done", ({ run_id: rid }) => {
        if (rid !== run_id) return;
        if (badge) { badge.innerText = "done"; }
    });
}

function closeRunPanel() {
    document.getElementById("scRunPanel").style.display = "none";
    const sc = getSocket();
    sc.off("run_board_status");
    sc.off("run_output");
    sc.off("run_board_nickname");
    sc.off("run_done");
}

// ── Script Control v2 ──
// ══════════════════════════════════════════════════════════════
// Script Control v2
// ══════════════════════════════════════════════════════════════
var sc2FilePath   = null;   // full path of the open file
var sc2DirPath    = null;   // current working directory
var sc2Scenario   = null;   // parsed YAML object
var sc2Expanded   = null;   // currently expanded section key

function sc2GetSocket() { return window._appSocket || window.appState?.socket; }

function sc2Esc(s) {
    return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── Open ──────────────────────────────────────────────────────
async function sc2Open() {
    let path = null;
    try {
        path = await window.pywebview.api.pick_file(
            window.appState?.scenariDir || "",
            ["YAML files (*.yaml)", "All files (*.*)"]
        );
    } catch(e) {
        path = prompt("YAML file path:");
    }
    if (!path) return;

    let data;
    try {
        const res = await fetch(`/api/scenario-open?path=${encodeURIComponent(path)}`);
        data = await res.json();
    } catch(e) {
        alert("Fetch error: " + e); return;
    }
    if (!data.ok) { alert("Could not open: " + data.error); return; }
    if (!data.content) { alert("File is empty or unreadable"); return; }

    sc2FilePath = path;
    sc2DirPath  = data.dir;

    // Wait for jsyaml CDN if not yet loaded
    let attempts = 0;
    while (!window.jsyaml && attempts++ < 10) {
        await new Promise(r => setTimeout(r, 200));
    }
    if (!window.jsyaml) { alert("YAML parser not available"); return; }

    try {
        sc2Scenario = window.jsyaml.load(data.content) || {};
    } catch(e) {
        alert("YAML parse error: " + e.message); return;
    }

    sc2UpdatePathBar(data.filename);
    sc2UpdateTitle(data.filename);
    sc2BuildSections();
    document.getElementById("sc2CheckBtn").disabled = false;
    document.getElementById("sc2SaveBtn").disabled  = false;
    document.getElementById("sc2RunBtn").disabled   = true;
    document.getElementById("sc2CheckWrap").style.display = "none";
}

// ── New ───────────────────────────────────────────────────────
function sc2New() {
    sc2FilePath = null;
    sc2Scenario = { boards: [] };   // valid empty scenario
    sc2Expanded = null;
    sc2UpdatePathBar(null);
    sc2UpdateTitle("New scenario");
    sc2BuildSections();
    const boardActions = document.getElementById("sc2BoardActions");
    if (boardActions) boardActions.style.display = "flex";
    document.getElementById("sc2CheckBtn").disabled = false;
    document.getElementById("sc2SaveBtn").disabled  = true;
    document.getElementById("sc2RunBtn").disabled   = true;
    document.getElementById("sc2CheckWrap").style.display = "none";
}

// ── Change directory ──────────────────────────────────────────
async function sc2ChangeDir() {
    let dir = null;
    try {
        dir = await window.pywebview.api.pick_directory(sc2DirPath || "");
    } catch(e) {
        dir = prompt("Directory path:", sc2DirPath || "");
    }
    if (!dir) return;
    sc2DirPath = dir;
    document.getElementById("sc2Dir").innerText = dir;
    document.getElementById("sc2Empty").style.display = "none";
}

// ── Save ──────────────────────────────────────────────────────
async function sc2Save() {
    if (!sc2FilePath || !sc2Scenario) return;
    const cleaned = {};
    if (sc2Scenario.script) cleaned.script = sc2Scenario.script;
    if (sc2Scenario.boards && sc2Scenario.boards.length > 0) {
        cleaned.boards = sc2Scenario.boards.map(b => {
            const out = {};
            if (b.nickname)  out.nickname  = b.nickname;
            if (b.board)     out.board     = b.board;
            if (b.connection !== undefined && b.connection !== "") out.connection = b.connection;
            if (b.s37_files && b.s37_files.length) out.s37_files = b.s37_files;
            if (b.script)    out.script    = b.script;
            out.masserase     = b.masserase     !== false;
            out.halt_reset    = b.halt_reset    === true;
            out.open_terminal = b.open_terminal === true;
            return out;
        });
    }
    const content = window.jsyaml.dump(cleaned, { lineWidth: -1, noRefs: true });
    const res = await fetch("/api/scenario-open-save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ path: sc2FilePath, content })
    });
    const data = await res.json();
    if (!data.ok) alert("Save failed: " + data.error);
    else sc2Flash("sc2SaveBtn", "Saved ✓");
}

// ── Save As ───────────────────────────────────────────────────
async function sc2SaveAs() {
    if (!sc2Scenario) { alert("No scenario to save"); return; }

    const defaultName = sc2FilePath
        ? sc2FilePath.split("/").pop().split("\\").pop()
        : "new_scenario.yaml";
    let filename = prompt("Filename:", defaultName);
    if (!filename || !filename.trim()) return;
    filename = filename.trim();
    if (!filename.endsWith(".yaml") && !filename.endsWith(".yml")) filename += ".yaml";

    let dir = sc2DirPath;
    if (!dir) {
        dir = prompt("Directory (full path):", "");
        if (!dir || !dir.trim()) return;
        sc2DirPath = dir.trim();
        dir = sc2DirPath;
    }
    const path = dir.replace(/\/$/, "") + "/" + filename;

    // Serialize — strip nulls and empty strings
    const cleaned = {};
    if (sc2Scenario.script) cleaned.script = sc2Scenario.script;
    if (sc2Scenario.boards && sc2Scenario.boards.length > 0) {
        cleaned.boards = sc2Scenario.boards.map(b => {
            const out = {};
            if (b.nickname)      out.nickname      = b.nickname;
            if (b.board)         out.board         = b.board;
            if (b.connection !== undefined && b.connection !== "")
                                 out.connection    = b.connection;
            if (b.s37_files && b.s37_files.length) out.s37_files = b.s37_files;
            if (b.script)        out.script        = b.script;
            out.masserase     = b.masserase     !== false;
            out.halt_reset    = b.halt_reset    === true;
            out.open_terminal = b.open_terminal === true;
            return out;
        });
    }
    const content = window.jsyaml.dump(cleaned, { lineWidth: -1, noRefs: true });
    if (!content || !content.trim()) { alert("Nothing to save"); return; }

    const res  = await fetch("/api/scenario-open-save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ path, content })
    });
    const data = await res.json();
    if (!data.ok) { alert("Save failed: " + data.error); return; }

    sc2FilePath = path;
    sc2DirPath  = data.dir;
    sc2UpdatePathBar(filename);
    sc2UpdateTitle(filename.replace(/\.ya?ml$/i, "").toUpperCase());
    document.getElementById("sc2SaveBtn").disabled = false;
    sc2Flash("sc2SaveAsBtn", "Saved ✓");
}

// ── Check ─────────────────────────────────────────────────────
async function sc2Check() {
    if (!sc2Scenario) return;

    // Pre-check for duplicates before sending to server
    const boards = sc2Scenario.boards || [];
    const conns  = boards.map(b => (b.connection||"").trim()).filter(Boolean);
    const nicks  = boards.map(b => (b.nickname||"").trim()).filter(Boolean);
    const dupConn = conns.filter((v,i) => conns.indexOf(v) !== i);
    const dupNick = nicks.filter((v,i) => nicks.indexOf(v) !== i);

    const localIssues = [];
    if (dupConn.length) dupConn.forEach(c => localIssues.push({type:"error", msg:`Duplicate connection: ${c}`}));
    if (dupNick.length) dupNick.forEach(n => localIssues.push({type:"error", msg:`Duplicate nickname: ${n}`}));

    if (localIssues.length) {
        const btn = document.getElementById("sc2CheckBtn");
        btn.innerText = `✗ ${localIssues.length} error${localIssues.length>1?"s":""}`;
        btn.classList.add("error");
        const wrap = document.getElementById("sc2CheckWrap");
        wrap.style.display = "";
        wrap.innerHTML = localIssues.map(i => `<div style="color:#E24B4A">✗ ${sc2Esc(i.msg)}</div>`).join("");
        document.getElementById("sc2RunBtn").disabled = true;
        setTimeout(() => { btn.innerText = "Check"; btn.classList.remove("error"); }, 3000);
        return;
    }
    const clean   = JSON.parse(JSON.stringify(sc2Scenario, (k, v) => v === null ? undefined : v));
    const content = window.jsyaml.dump(clean, { lineWidth: -1, noRefs: true });
    const dir     = sc2DirPath ? sc2DirPath.split("/").pop() : "";
    const base    = sc2DirPath ? sc2DirPath.substring(0, sc2DirPath.lastIndexOf("/")) : "";

    const btn = document.getElementById("sc2CheckBtn");
    btn.innerText = "…";

    const res  = await fetch("/api/scenario-check", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ base, dir, content })
    });
    const data = await res.json();

    if (!data.issues || data.issues.length === 0) {
        btn.innerText = "✓ OK";
        btn.classList.add("success");
        document.getElementById("sc2RunBtn").disabled = false;
        setTimeout(() => { btn.innerText = "Check"; btn.classList.remove("success"); }, 2500);
    } else {
        const errors   = data.issues.filter(i => i.type === "error");
        const warnings = data.issues.filter(i => i.type === "warning");
        if (errors.length) {
            btn.innerText = `✗ ${errors.length} error${errors.length>1?"s":""}`;
            btn.classList.add("error");
            document.getElementById("sc2RunBtn").disabled = true;
        } else {
            btn.innerText = `⚠ ${warnings.length} warning${warnings.length>1?"s":""}`;
            btn.classList.add("open");
            document.getElementById("sc2RunBtn").disabled = false;
        }
        // Show details in check wrap
        const wrap = document.getElementById("sc2CheckWrap");
        wrap.style.display = "";
        let html = "";
        if (errors.length)   html += errors.map(i   => `<div style="color:#E24B4A">✗ ${sc2Esc(i.msg)}</div>`).join("");
        if (warnings.length) html += warnings.map(i => `<div style="color:#EF9F27">⚠ ${sc2Esc(i.msg)}</div>`).join("");
        wrap.innerHTML = html;
        setTimeout(() => { btn.innerText = "Check"; btn.classList.remove("error","open"); }, 3000);
    }
}

// ── Run ───────────────────────────────────────────────────────
async function sc2Run() {
    if (!sc2FilePath) { alert("Save the scenario first."); return; }
    const dir  = sc2DirPath ? sc2DirPath.split("/").pop() : "";
    const base = sc2DirPath ? sc2DirPath.substring(0, sc2DirPath.lastIndexOf("/")) : "";
    const filename = sc2FilePath.split("/").pop().split("\\").pop();
    const path = dir ? `${dir}/${filename}` : filename;

    // Reuse existing run panel logic
    const res  = await fetch("/api/scenario-run", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ base, path })
    });
    const data = await res.json();
    if (!data.ok) { alert("Run failed: " + (data.error || "")); return; }

    // Join the run room so we receive socket events
    const sc = getSocket();
    if (sc.connected) {
        sc.emit("join_run", { run_id: data.run_id });
    } else {
        sc.once("connect", () => sc.emit("join_run", { run_id: data.run_id }));
    }
    sc2ShowRunPanel(data.run_id, filename.replace(/\.ya?ml$/i,"").toUpperCase());
}

// ── Add Board ─────────────────────────────────────────────────
function sc2AddBoard() {
    if (!sc2Scenario) return;
    if (!sc2Scenario.boards) sc2Scenario.boards = [];
    sc2Scenario.boards.push({
        nickname: "", board: "", connection: "",
        s37_files: [], script: "",
        masserase: true, halt_reset: false, open_terminal: false
    });
    sc2BuildSections();
    const newIdx = sc2Scenario.boards.length - 1;
    sc2ToggleSection(`board:${newIdx}`);
}

// ── From group ────────────────────────────────────────────────
async function sc2FromGroup() {
    const overlay = document.getElementById("sc2GroupOverlay");
    const list    = document.getElementById("sc2GroupList");
    list.innerHTML = "";
    try {
        const res   = await fetch("/groups");
        const names = await res.json();
        for (const name of names) {
            const gres  = await fetch(`/groups/${encodeURIComponent(name)}`);
            const gdata = await gres.json();
            const count = (gdata.adapters || []).length;
            const item  = document.createElement("div");
            item.style.cssText = "display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:8px;cursor:pointer;background:#EFF2F9;box-shadow:-2px -2px 4px rgba(250,251,255,1),2px 2px 4px rgba(22,27,29,0.18);";
            item.innerHTML = `<span style="font-size:12px;color:#1a2630;font-weight:500;">${name}</span><span style="font-size:11px;color:#8899aa;">${count} adapter${count!==1?"s":""}</span>`;
            item.onmouseover = () => item.style.background = "#e4e8f4";
            item.onmouseout  = () => item.style.background = "#EFF2F9";
            item.onclick = () => { sc2ImportGroup(gdata); sc2CloseGroupPicker(); };
            list.appendChild(item);
        }
        if (names.length === 0) list.innerHTML = '<div style="color:#b5bfc6;font-size:12px;text-align:center;padding:12px;">No saved groups</div>';
    } catch(e) { list.innerHTML = '<div style="color:#E24B4A;font-size:12px;">Error loading groups</div>'; }
    overlay.style.display = "flex";
}

function sc2CloseGroupPicker() {
    document.getElementById("sc2GroupOverlay").style.display = "none";
}

function sc2ImportGroup(gdata) {
    if (!sc2Scenario) return;
    if (!sc2Scenario.boards) sc2Scenario.boards = [];

    // Build sets of existing identifiers to avoid duplicates
    const existingConns = new Set(sc2Scenario.boards
        .map(b => (b.connection || "").trim().toLowerCase())
        .filter(Boolean));
    const existingNicks = new Set(sc2Scenario.boards
        .map(b => (b.nickname || "").trim().toLowerCase())
        .filter(Boolean));

    let added = 0, skipped = 0;
    (gdata.adapters || []).forEach(a => {
        const isUSB     = a.connectivityType === "usb";
        const isIP      = !isUSB;
        const conn      = isUSB
            ? (a.serialNumber || "").trim().toLowerCase()
            : (a.host || "").trim().toLowerCase();
        const nick      = (a.nickname || "").trim().toLowerCase();
        const boardShort = a.boardId ? a.boardId.replace(/^BRD/i,"") : "";

        // Skip if connection or nickname already exists
        if (conn && existingConns.has(conn)) { skipped++; return; }
        if (nick && existingNicks.has(nick))  { skipped++; return; }

        sc2Scenario.boards.push({
            nickname:      a.nickname || "",
            board:         boardShort,
            connection:    isUSB ? (a.serialNumber || "") : (a.host || ""),
            s37_files:     [],
            script:        "",
            masserase:     true,
            halt_reset:    false,
            open_terminal: false
        });
        if (conn) existingConns.add(conn);
        if (nick) existingNicks.add(nick);
        added++;
    });

    if (skipped > 0) alert(`${added} board(s) added, ${skipped} skipped (already in scenario).`);
    sc2BuildSections();
}

// ── Build sections DOM ────────────────────────────────────────
function sc2BuildSections() {
    const body   = document.getElementById("sc2Body");
    const sc     = sc2Scenario || {};
    const boards = sc.boards || [];
    const gScript = (sc.script || "").toString().replace(/^null$/i,"").trim();
    const hasBoards = boards.length > 0;

    // Show/hide board action buttons
    const boardActions = document.getElementById("sc2BoardActions");
    if (boardActions) boardActions.style.display = "flex";

    let html = '<div class="sc-sections">';

    // Global script section
    html += `
    <div class="sc-section" id="sc2-sec-global">
        <div class="sc-section-header" onclick="sc2ToggleSection('global')">
            <span class="sc-section-arrow" id="sc2-arr-global">▶</span>
            <span class="sc-section-icon">⚙</span>
            <span class="sc-section-title">Global Script</span>
            <span class="sc-section-badge">${gScript ? sc2Esc(gScript) : '<span style="color:#b5bfc6">none</span>'}</span>
        </div>
        <div class="sc-section-body" id="sc2-body-global" style="display:none">
            <div class="sc-section-form">
                <div class="sc-sf-row">
                    <label class="sc-sf-label">Script</label>
                    <div class="sc-sf-input-group">
                        <input class="sc-sf-input" id="sc2-global-script" value="${sc2Esc(gScript)}" placeholder="global_script.py">
                        <button class="sc-browse-btn" onclick="sc2BrowseFile('sc2-global-script')">📁</button>
                    </div>
                </div>
                <div class="sc-sf-row sc-sf-hint">File will be copied to the scenario directory if needed.</div>
                <div class="sc-section-actions">
                    <button class="sc-browse-btn" onclick="sc2UpdateGlobal()">Update</button>
                </div>
            </div>
        </div>
    </div>`;

    boards.forEach((b, i) => {
        const nick   = b.nickname || "";
        const board  = b.board   || "";
        const conn   = (b.connection !== undefined ? b.connection : b.jlink_name_or_ip) || "";
        const script = b.script  || "";
        const badge  = [nick, board, conn].filter(Boolean).join("  ·  ");
        const masserase = b.masserase !== false;
        const haltReset = b.halt_reset  === true;
        const openTerm  = b.open_terminal === true;

        html += `
    <div class="sc-section" id="sc2-sec-board-${i}">
        <div class="sc-section-header" onclick="sc2ToggleSection('board:${i}')">
            <span class="sc-section-arrow" id="sc2-arr-board-${i}">▶</span>
            <span class="sc-section-icon">🔲</span>
            <span class="sc-section-title">Board ${i}</span>
            <span class="sc-section-badge">${sc2Esc(badge) || '<span style="color:#b5bfc6">unnamed</span>'}</span>
            <span class="sc-section-del" onclick="sc2RemoveBoard(event,${i})">✕</span>
        </div>
        <div class="sc-section-body" id="sc2-body-board-${i}" style="display:none">
            <div class="sc-section-form">
                <div class="sc-sf-row">
                    <label class="sc-sf-label">Nickname</label>
                    <input class="sc-sf-input" id="sc2-nick-${i}" value="${sc2Esc(nick)}" placeholder="e.g. tx">
                </div>
                <div class="sc-sf-row">
                    <label class="sc-sf-label">Board</label>
                    <input class="sc-sf-input" id="sc2-board-${i}" value="${sc2Esc(board)}" placeholder="e.g. 4162A">
                </div>
                <div class="sc-sf-row">
                    <label class="sc-sf-label">Connection</label>
                    <input class="sc-sf-input" id="sc2-conn-${i}" value="${sc2Esc(conn)}" placeholder="IP or USB serial; empty = any USB">
                </div>
                <div class="sc-sf-row">
                    <label class="sc-sf-label">S37 files</label>
                    <div class="sc-sf-s37-wrap" id="sc2-s37-wrap-${i}"></div>
                </div>
                <div class="sc-sf-row">
                    <label class="sc-sf-label"></label>
                    <button class="sc-browse-btn" onclick="sc2AddS37(${i})">+ Add S37</button>
                </div>
                <div class="sc-sf-row">
                    <label class="sc-sf-label">Script</label>
                    <div class="sc-sf-input-group">
                        <input class="sc-sf-input" id="sc2-script-${i}" value="${sc2Esc(script)}" placeholder="board_script.py">
                        <button class="sc-browse-btn" onclick="sc2BrowseFile('sc2-script-${i}')">📁</button>
                    </div>
                </div>
                <div class="sc-sf-row">
                    <label class="sc-sf-label">Options</label>
                    <label class="sc-sf-check"><input type="checkbox" id="sc2-masserase-${i}" ${masserase?"checked":""}> Mass erase</label>
                    <label class="sc-sf-check"><input type="checkbox" id="sc2-halt-${i}" ${haltReset?"checked":""}> Halt reset</label>
                    <label class="sc-sf-check"><input type="checkbox" id="sc2-term-${i}" ${openTerm?"checked":""}> Terminal</label>
                </div>
                <div class="sc-section-actions">
                    <button class="sc-browse-btn" onclick="sc2UpdateBoard(${i})">Update</button>
                </div>
            </div>
        </div>
    </div>`;
    });

    html += '</div>';
    body.innerHTML = html;
    boards.forEach((b, i) => sc2RenderS37(i, b.s37_files || []));
}

// ── Section toggle ────────────────────────────────────────────
function sc2ToggleSection(key) {
    const isGlobal = key === "global";
    const bodyId   = isGlobal ? "sc2-body-global"   : `sc2-body-board-${key.split(":")[1]}`;
    const arrId    = isGlobal ? "sc2-arr-global"    : `sc2-arr-board-${key.split(":")[1]}`;
    const body     = document.getElementById(bodyId);
    const arr      = document.getElementById(arrId);
    if (!body) return;
    const opening = body.style.display === "none";
    if (sc2Expanded && sc2Expanded !== key) {
        const pIsGlobal = sc2Expanded === "global";
        const pb = document.getElementById(pIsGlobal ? "sc2-body-global" : `sc2-body-board-${sc2Expanded.split(":")[1]}`);
        const pa = document.getElementById(pIsGlobal ? "sc2-arr-global"  : `sc2-arr-board-${sc2Expanded.split(":")[1]}`);
        if (pb) pb.style.display = "none";
        if (pa) pa.innerText = "▶";
    }
    body.style.display = opening ? "" : "none";
    arr.innerText = opening ? "▼" : "▶";
    sc2Expanded = opening ? key : null;
}

// ── S37 helpers ───────────────────────────────────────────────
function sc2RenderS37(boardIdx, files) {
    const wrap = document.getElementById(`sc2-s37-wrap-${boardIdx}`);
    if (!wrap) return;
    wrap.innerHTML = "";
    files.forEach((f, fi) => {
        const item = document.createElement("div");
        item.className = "sc-s37-item";
        item.innerHTML = `<span>${sc2Esc(f)}</span><span class="sc-s37-remove" onclick="sc2RemoveS37(${boardIdx},${fi})">✕</span>`;
        wrap.appendChild(item);
    });
    if (!files.length) wrap.innerHTML = '<span style="color:#b5bfc6;font-size:11px">No files</span>';
}
function sc2RemoveS37(boardIdx, fileIdx) {
    sc2Scenario.boards[boardIdx].s37_files.splice(fileIdx, 1);
    sc2RenderS37(boardIdx, sc2Scenario.boards[boardIdx].s37_files);
}
async function sc2AddS37(boardIdx) {
    const path = await sc2PickFile(["S37 files (*.s37)", "All files (*.*)"]);
    if (!path) return;
    const copied = await sc2CopyFile(path);
    if (!copied) return;
    if (!sc2Scenario.boards[boardIdx].s37_files) sc2Scenario.boards[boardIdx].s37_files = [];
    sc2Scenario.boards[boardIdx].s37_files.push(copied);
    sc2RenderS37(boardIdx, sc2Scenario.boards[boardIdx].s37_files);
}

// ── Browse & copy file helpers ────────────────────────────────
async function sc2BrowseFile(inputId) {
    const path = await sc2PickFile(["Python scripts (*.py)", "All files (*.*)"]);
    if (!path) return;
    const copied = await sc2CopyFile(path);
    if (copied) document.getElementById(inputId).value = copied;
}
async function sc2PickFile(fileTypes) {
    if (window.pywebview?.api)
        return await window.pywebview.api.pick_file(sc2DirPath || "", fileTypes);
    return prompt("File path:") || null;
}
async function sc2CopyFile(srcPath) {
    const dir  = sc2DirPath ? sc2DirPath.split("/").pop() : "";
    const base = sc2DirPath ? sc2DirPath.substring(0, sc2DirPath.lastIndexOf("/")) : "";
    try {
        const res  = await fetch("/api/scenario-copy-file", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ src: srcPath, base, dir })
        });
        const data = await res.json();
        if (!data.ok) { alert("Copy failed: " + data.error); return null; }
        return data.filename;
    } catch(e) { return null; }
}

// ── Update handlers ───────────────────────────────────────────
function sc2UpdateGlobal() {
    const script = document.getElementById("sc2-global-script").value.trim();
    sc2Scenario.script = script || null;
    if (!script) delete sc2Scenario.script;
    sc2BuildSections();
    sc2ToggleSection("global");
}
function sc2UpdateBoard(i) {
    const b = sc2Scenario.boards[i];
    b.nickname      = document.getElementById(`sc2-nick-${i}`).value.trim()     || undefined;
    b.board         = document.getElementById(`sc2-board-${i}`).value.trim()    || undefined;
    b.connection    = document.getElementById(`sc2-conn-${i}`).value.trim()     || undefined;
    b.script        = document.getElementById(`sc2-script-${i}`).value.trim()   || undefined;
    b.masserase     = document.getElementById(`sc2-masserase-${i}`).checked;
    b.halt_reset    = document.getElementById(`sc2-halt-${i}`).checked;
    b.open_terminal = document.getElementById(`sc2-term-${i}`).checked;
    Object.keys(b).forEach(k => { if (b[k] === undefined) delete b[k]; });
    sc2BuildSections();
    sc2ToggleSection(`board:${i}`);
}
function sc2RemoveBoard(event, i) {
    event.stopPropagation();
    if (sc2Scenario.boards.length <= 1) { alert("Need at least one board."); return; }
    const nick = sc2Scenario.boards[i].nickname || `Board ${i}`;
    if (!confirm(`Remove ${nick}?`)) return;
    sc2Scenario.boards.splice(i, 1);
    sc2BuildSections();
}

// ── UI helpers ────────────────────────────────────────────────
function sc2UpdatePathBar(filename) {
    document.getElementById("sc2Dir").innerText = sc2DirPath || "— no directory —";
    const empty = document.getElementById("sc2Empty");
    if (empty) empty.style.display = filename ? "none" : "";
}
function sc2UpdateTitle(name) {
    document.getElementById("sc2Title").innerText =
        name ? name.replace(/\.ya?ml$/i,"").toUpperCase() : "—";
}
function sc2SetButtons(hasSave) {
    document.getElementById("sc2CheckBtn").disabled = false;
    document.getElementById("sc2RunBtn").disabled   = true;
    document.getElementById("sc2SaveBtn").disabled  = !hasSave;
    document.getElementById("sc2CheckWrap").style.display = "none";
}
function sc2Flash(btnId, text) {
    const btn = document.getElementById(btnId);
    const orig = btn.innerText;
    btn.innerText = text;
    setTimeout(() => btn.innerText = orig, 1500);
}

// ── Run panel (reuse existing sc run panel logic) ─────────────
function sc2ShowRunPanel(runId, scenarioName) {
    const titleEl = document.getElementById("scRunTitle");
    if (titleEl) titleEl.innerText = `Run — ${scenarioName}`;
    openRunPanel(runId);
}

// ── onPageLoad ────────────────────────────────────────────────
function onPageLoad() {
    if (window.appState) {
        sc2DirPath = window.appState.scenariDir || null;
        sc2UpdatePathBar(null);
    }
}
</script>
