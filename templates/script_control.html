<!-- ── script control page fragment ── -->

<!-- barre de boutons centrée -->
<div class="test-source-bar" style="gap:12px; margin-bottom:16px;">
    <button id="scLoadBtn"   onclick="activateMode('load')">Load</button>
    <button id="scCreateBtn" onclick="activateMode('create')">Create</button>
    <button id="scCheckBtn"  onclick="onScCheck()" disabled>Check</button>
    <button id="scRunBtn"    onclick="onScRun()"   disabled>Run</button>
</div>

<!-- layout 2 colonnes -->
<div class="sc-grid">

    <!-- colonne gauche -->
    <div class="sc-panel">
        <div class="sc-panel-header">
            <span class="sc-panel-title" id="scLeftTitle">Scenarios</span>
            <div class="panel-spacer"></div>
            <!-- Load mode -->
            <button class="sc-browse-btn" id="scBrowseBtn" onclick="browseDirectory()">Browse…</button>
            <!-- Create mode -->
            <button class="sc-browse-btn" id="scNewDirBtn" onclick="newDirectory()" style="display:none">New dir…</button>
        </div>
        <div class="sc-dir-path" id="scDirPath">./scenari</div>
        <div class="sc-list-wrap" id="scListWrap">
            <div class="sc-hint">Click Load or Create</div>
        </div>
    </div>

    <!-- colonne droite -->
    <div class="sc-panel">
        <div class="sc-panel-header">
            <span class="sc-panel-title" id="scRightTitle">Content</span>
            <div class="panel-spacer"></div>
            <button class="sc-browse-btn" id="scAddBoardBtn" onclick="openBoardForm()" style="display:none">+ Board</button>
            <button class="sc-browse-btn" id="scFromGroupBtn" onclick="toggleGroupPicker()" style="display:none">From group</button>
            <button class="sc-browse-btn" id="scSaveBtn" onclick="saveScenario()" style="display:none">Save…</button>
        </div>
        <div id="scSelectedDir" style="display:none" class="sc-dir-path">
            <span style="color:#8899aa">Directory: </span><span id="scSelectedDirName" style="color:#185FA5">— none selected —</span>
        </div>
        <div class="sc-yaml-wrap" id="scYamlView">
            <div class="sc-hint">Select a scenario to view its content</div>
        </div>
        <div id="scCheckReport" style="display:none" class="sc-check-report">
            <div class="sc-check-header" id="scCheckHeader"></div>
            <div class="sc-check-list" id="scCheckList"></div>
        </div>
        <textarea id="scYamlEditor" class="sc-yaml-editor" spellcheck="false"
            style="display:none; flex:1; margin:10px;"
            oninput="if(typeof onEditorInput==='function'){onEditorInput();}"></textarea>
    </div>

</div>

<!-- ── Run output panel ── -->
<div id="scRunPanel" style="display:none; position:fixed; inset:0; background:rgba(22,27,29,0.35); z-index:200; align-items:flex-start; justify-content:center; padding-top:32px; padding-bottom:32px;">
    <div id="scRunDialog">
        <!-- header -->
        <div class="sc-run-header">
            <span class="sc-panel-title" id="scRunTitle">Run</span>
            <div class="panel-spacer"></div>
            <span id="scRunStatusBadge" class="sc-run-badge"></span>
            <span class="group-close" onclick="closeRunPanel()">✕</span>
        </div>
        <!-- body: left (boards) + right (log) -->
        <div class="sc-run-body">
            <!-- left 1/3 : board mini-cards -->
            <div class="sc-run-left">
                <div class="sc-run-section-title">Boards</div>
                <div id="scRunBoards" class="sc-run-boards-grid"></div>
            </div>
            <!-- right 2/3 : log output -->
            <div class="sc-run-right">
                <div class="sc-run-section-title">Output</div>
                <div id="scRunLog" class="sc-run-log"></div>
            </div>
        </div>
        <!-- footer -->
        <div class="sc-board-form-footer">
            <button class="sc-browse-btn" id="scRunClearBtn" onclick="document.getElementById('scRunLog').innerHTML=''">Clear</button>
            <button class="sc-browse-btn" onclick="closeRunPanel()">Close</button>
        </div>
    </div>
</div>

<div id="boardFormOverlay" style="display:none; position:fixed; inset:0; background:rgba(22,27,29,0.35); z-index:200; align-items:center; justify-content:center;">
    <div class="sc-board-form">
        <div class="sc-board-form-header">
            <span class="sc-panel-title">Add board entry</span>
            <span class="group-close" onclick="closeBoardForm()">✕</span>
        </div>
        <div class="sc-board-form-body">
            <div class="sc-form-row">
                <label class="sc-form-label">Adapter</label>
                <select id="bfAdapter" class="sc-select" onchange="onAdapterSelect(this.value)">
                    <option value="">— pre-fill from adapter —</option>
                </select>
            </div>
            <div class="sc-form-row">
                <label class="sc-form-label">Board ID</label>
                <input id="bfBoard" class="sc-form-input" type="text" placeholder="e.g. BRD4162A" />
            </div>
            <div class="sc-form-row">
                <label class="sc-form-label">JLink / IP</label>
                <input id="bfJlink" class="sc-form-input" type="text" placeholder="IP address or serial number" />
            </div>
            <div class="sc-form-row">
                <label class="sc-form-label">Options</label>
                <div style="display:flex; gap:16px; flex-wrap:wrap;">
                    <label class="sc-form-check"><input type="checkbox" id="bfMasserase" checked> masserase</label>
                    <label class="sc-form-check"><input type="checkbox" id="bfHaltReset" checked> halt_reset</label>
                    <label class="sc-form-check"><input type="checkbox" id="bfOpenTerm" checked> open_terminal</label>
                </div>
            </div>
            <div class="sc-form-row">
                <label class="sc-form-label">S37 files</label>
                <div style="display:flex; flex-direction:column; gap:6px; flex:1; min-width:0;">
                    <div id="bfS37List" style="display:flex; flex-direction:column; gap:4px;"></div>
                    <button class="sc-browse-btn" onclick="addS37File()">+ Add s37…</button>
                </div>
            </div>
            <div class="sc-form-row">
                <label class="sc-form-label">Script</label>
                <div style="display:flex; gap:8px; flex:1; align-items:center; min-width:0;">
                    <input id="bfScript" class="sc-form-input" type="text" placeholder="optional" style="flex:1;" />
                    <button class="sc-browse-btn" onclick="browseScript()">Browse…</button>
                </div>
            </div>
        </div>
        <div class="sc-board-form-footer">
            <button class="sc-browse-btn" onclick="closeBoardForm()">Cancel</button>
            <button class="sc-browse-btn" onclick="appendBoard()" style="color:#1D9E75; font-weight:500;">Add board</button>
        </div>
    </div>
</div>

<!-- floating group picker -->
<div class="group-panel" id="scGroupPicker">

    <div class="group-panel-body">

</div>

<script>
let activeScenario  = null;
let scenariBaseDir  = null;
let scMode          = null;
let scSelectedDir   = null;
let currentRunId    = null;

function getSocket() {
    return window._appSocket || (window._appSocket = io());
}

const YAML_TEMPLATE = `boards:
  - board: 
    jlink_name_or_ip: 
    masserase: true
    halt_reset: true
    open_terminal: true
    s37_files: 
      - .s37
    script: ""
`;

function onPageLoad() {
    if (window.appState.scenariDir) {
        scenariBaseDir = window.appState.scenariDir;
        document.getElementById("scDirPath").innerText = scenariBaseDir;
        activateMode("load");
    } else {
        fetch("/api/scenarios-default")
            .then(r => r.json())
            .then(d => {
                scenariBaseDir = d.path;
                window.appState.scenariDir = d.path;
                document.getElementById("scDirPath").innerText = d.path;
                activateMode("load");
            });
    }
}

function activateMode(mode) {
    scMode = mode;
    document.getElementById("scLoadBtn").classList.toggle("open",   mode === "load");
    document.getElementById("scCreateBtn").classList.toggle("open", mode === "create");
    document.getElementById("scBrowseBtn").style.display    = mode === "load"   ? "" : "none";
    document.getElementById("scNewDirBtn").style.display    = mode === "create" ? "" : "none";
    document.getElementById("scAddBoardBtn").style.display  = mode === "create" ? "" : "none";
    document.getElementById("scFromGroupBtn").style.display = mode === "create" ? "" : "none";
    document.getElementById("scSaveBtn").style.display      = mode === "create" ? "" : "none";

    document.getElementById("scRightTitle").innerText       = mode === "load" ? "Content" : "New Scenario";

    if (mode === "load") {

        document.getElementById("scYamlEditor").style.display = "none";

            document.getElementById("scEditorHint").style.display = "none";

        scSelectedDir = null;
        document.getElementById("scSelectedDirName").innerText = "\u2014 none selected \u2014";

async function loadScenarios() {
    if (!scenariBaseDir) return;
    const btn = document.getElementById("scLoadBtn");
    btn.disabled = true;
    try {
        const res  = await fetch(`/api/scenarios?dir=${encodeURIComponent(scenariBaseDir)}`);
        const data = await res.json();
        renderScenarios(data);
    } catch(e) { console.error("load scenarios failed:", e); }
    btn.disabled = false;
}

function renderScenarios(data) {
    const wrap = document.getElementById("scListWrap");
    wrap.innerHTML = "";
    if (!data || data.length === 0) {
        wrap.innerHTML = '<div class="sc-hint">No scenarios found</div>';
        return;
    }
    data.forEach(({ dir, files }) => {
        const groupTitle = document.createElement("div");
        groupTitle.className = "sc-group-title" + (scMode === "create" ? " sc-dir-selectable" : "");
        groupTitle.innerText = dir;
        groupTitle.dataset.dir = dir;
        if (scMode === "create") groupTitle.onclick = () => selectDirectory(dir);
        wrap.appendChild(groupTitle);

        if (files.length === 0 && scMode === "create") {
            const hint = document.createElement("div");
            hint.style.cssText = "font-size:10px; color:#b5bfc6; padding:2px 8px 4px;";
            hint.innerText = "empty";
            wrap.appendChild(hint);
        }

        files.forEach(file => {
            const name = file.replace(/\.yaml$/, "");
            const key  = `${dir}/${file}`;
            const item = document.createElement("div");
            item.className = "sc-item";
            item.dataset.key = key;
            item.dataset.dir = dir;
            item.innerHTML = `<span class="sc-item-name">${name}</span>`;
            if (scMode === "load") {
                item.onclick = () => selectScenario(item, key, name, dir, file);
            } else {
                item.onclick = () => copyScenario(item, key, name, dir);
            }
            wrap.appendChild(item);
        });
    });
}

async function selectScenario(el, key, name, dir, file) {
    document.querySelectorAll(".sc-item").forEach(i => i.classList.remove("sc-item-active"));
    el.classList.add("sc-item-active");
    activeScenario = { key, name, dir, file };
    document.getElementById("scCheckBtn").disabled = false;
    document.getElementById("scRunBtn").disabled   = false;
    document.getElementById("scRightTitle").innerText = name;
    document.getElementById("scCheckReport").style.display = "none";
    try {
        const res  = await fetch(`/api/scenario-content?dir=${encodeURIComponent(scenariBaseDir)}&path=${encodeURIComponent(key)}`);
        const data = await res.json();
        renderYaml(data.content || "");
    } catch(e) {
        document.getElementById("scYamlView").innerHTML =
            '<div class="sc-hint" style="color:#E24B4A">Error loading file</div>';
    }
}

function selectDirectory(dir) {
    scSelectedDir = dir;
    document.getElementById("scSelectedDirName").innerText = dir;
    document.querySelectorAll(".sc-group-title").forEach(t =>
        t.classList.toggle("sc-dir-active", t.dataset.dir === dir));
    document.querySelectorAll(".sc-item").forEach(i => i.classList.remove("sc-item-active"));
    document.getElementById("scYamlEditor").value = YAML_TEMPLATE;
    document.getElementById("scRightTitle").innerText = "New Scenario";
    document.getElementById("scCheckReport").style.display = "none"
}

async function copyScenario(el, key, name, dir) {

    try {

async function onScCheck() {
    const btn = document.getElementById("scCheckBtn");
    btn.classList.add("open");
    btn.disabled = true;
    document.getElementById("scCheckReport").style.display = "none";

    let body;
    if (scMode === "create") {
        const content = document.getElementById("scYamlEditor").value;
        body = { base: scenariBaseDir, dir: scSelectedDir || "", content };
    } else {
        if (!activeScenario) { btn.disabled = false; return; }
        body = { base: scenariBaseDir, path: activeScenario.key };
    }

    try {
        const res  = await fetch("/api/scenario-check", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
        });
        const data = await res.json();
        const issueLines = new Set((data.issues || []).map(i => i.line).filter(Boolean));
        const allOk    = data.ok;
        const hasIssues = (data.issues || []).length > 0;

        if (scMode === "load" && data.content) renderYaml(data.content, issueLines);
        if (hasIssues) showCheckReport(allOk, data.issues || []);

        btn.classList.remove("open");
        btn.classList.add(allOk ? "success" : "error");
        setTimeout(() => {
            btn.classList.remove("success", "error");
            btn.disabled = false;
        }, allOk ? 3000 : 5000);
    } catch(e) {
        btn.classList.remove("open");
        btn.disabled = false;
    }
}

function showCheckReport(ok, issues) {
    const errors   = issues.filter(i => i.level === "error");
    const warnings = issues.filter(i => i.level === "warning");
    const allOk    = errors.length === 0;

    if (allOk && issues.length === 0) return;

    const popup = document.getElementById("scCheckPopup");
    const title = document.getElementById("scCheckPopupTitle");
    const body  = document.getElementById("scCheckPopupBody");

    if (allOk) {
        title.innerText   = warnings.length > 0
            ? `⚠ ${warnings.length} warning${warnings.length > 1 ? "s" : ""} — OK to run`
            : "✓ All checks passed";
        title.style.color = "#854F0B";
    } else {
        title.innerText   = `✕ ${errors.length} error${errors.length > 1 ? "s" : ""}` +
            (warnings.length > 0 ? ` + ${warnings.length} warning${warnings.length > 1 ? "s" : ""}` : "");
        title.style.color = "#A32D2D";
    }

    body.innerHTML = issues.map(i => {
        const color = i.level === "error"   ? "#A32D2D" :
                      i.level === "warning"  ? "#854F0B" : "#6E7F8D";
        const lineRef = i.level !== "info" && i.line
            ? `<span class="sc-check-line" style="color:${color};">line ${i.line}</span>`
            : "";
        return `<div class="sc-check-item" style="color:${color};">${lineRef}${esc(i.msg)}</div>`;
    }).join("");

    popup.style.display = "flex";
    popup.onclick = e => { if (e.target === popup) popup.style.display = "none"; };
}

async function onScRun() {
    if (!activeScenario) return;

    const btn = document.getElementById("scRunBtn");
    btn.classList.add("open");
    btn.disabled = true;

    // First run a check
    try {
        const checkRes = await fetch("/api/scenario-check", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ base: scenariBaseDir, path: activeScenario.key })
        });
        const checkData = await checkRes.json();
        const errors = (checkData.issues || []).filter(i => i.level === "error");
        if (errors.length > 0) {
            showCheckReport(false, checkData.issues || []);
            btn.classList.remove("open");
            btn.classList.add("error");
            setTimeout(() => { btn.classList.remove("error"); btn.disabled = false; }, 4000);
            return;
        }
    } catch(e) {
        btn.classList.remove("open");
        btn.disabled = false;
        return;
    }

    // Start run
    try {
        const res  = await fetch("/api/scenario-run", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ base: scenariBaseDir, path: activeScenario.key })
        });
        const data = await res.json();
        if (!data.ok) {
            console.error("Run failed:", data.error);
            btn.classList.remove("open");
            btn.disabled = false;
            return;
        }

        currentRunId = data.run_id;

        // Join room using persistent app socket
        const sc = getSocket();
        if (sc.connected) {
            sc.emit("join_run", { run_id: data.run_id });
            openRunPanel(data.run_id);
        } else {
            sc.once("connect", () => {
                sc.emit("join_run", { run_id: data.run_id });
            });
            openRunPanel(data.run_id);
        }

        btn.classList.remove("open");
        btn.classList.add("success");
        setTimeout(() => { btn.classList.remove("success"); btn.disabled = false; }, 2000);

    } catch(e) {
        console.error("Run error:", e);
        btn.classList.remove("open");
        btn.disabled = false;
    }
}

function openRunPanel(run_id) {
    const panel  = document.getElementById("scRunPanel");
    const log    = document.getElementById("scRunLog");
    const boards = document.getElementById("scRunBoards");
    if (!panel) return;
    log.innerHTML    = "";
    boards.innerHTML = "";

    // header
    const title = document.getElementById("scRunTitle");
    const badge = document.getElementById("scRunStatusBadge");
    if (title) title.innerText = `Run — ${activeScenario?.name || ""}`;
    if (badge) { badge.innerText = "running"; badge.className = "sc-run-badge"; }
    panel.style.display = "flex";

    // Track board index for display name fallback
    const boardIndex = {};  // serial → display label

    const STATUS_COLOR = {
        pending:    "#b5bfc6",
        erasing:    "#EF9F27",
        flashing:   "#EF9F27",
        connecting: "#7b9ec8",
        ready:      "#7b9ec8",
        running:    "#185FA5",
        done:       "#1D9E75",
        error:      "#E24B4A",
    };

    const sc = getSocket();

    sc.on("run_board_status", ({ serial, status, msg }) => {
        let card = document.getElementById(`run_board_${serial}`);
        if (!card) {
            // First time we see this board — register index
            const idx = Object.keys(boardIndex).length;
            boardIndex[serial] = serial;  // will be overridden by nickname if available
            card = document.createElement("div");
            card.id = `run_board_${serial}`;
            card.className = "sc-run-board-card";
            card.innerHTML = `
                <div class="sc-run-card-top">
                    <span class="sc-run-card-dot" id="dot_${serial}"></span>
                    <span class="sc-run-card-name" id="name_${serial}">${esc(serial)}</span>
                    <span class="sc-run-card-status" id="st_${serial}"></span>
                </div>
                <div class="sc-run-card-msg" id="msg_${serial}"></div>`;
            boards.appendChild(card);
        }
        const color = STATUS_COLOR[status] || "#b5bfc6";
        const dot   = document.getElementById(`dot_${serial}`);
        const st    = document.getElementById(`st_${serial}`);
        const msgEl = document.getElementById(`msg_${serial}`);
        if (dot)   dot.style.background = color;
        if (st)    { st.innerText = status; st.style.color = color; }
        if (msgEl) msgEl.innerText = msg || "";
    });

    sc.on("run_output", ({ serial, data, stream }) => {
        const lines = data.split("\n").filter((l, i, a) => !(i === a.length - 1 && l === ""));
        if (!lines.length) return;

        if (stream === "flash") {
            // flash → carte gauche uniquement, sans filename
            const msgEl = document.getElementById(`msg_${serial}`);
            if (msgEl) msgEl.innerText = "";
            return;
        }

        if (stream === "vcom" || stream === "admin") {
            // Raw board exchanges → not shown in output log
            return;
        }

        // Tout le reste → log droit
        let prefix, cls;
        if (serial === "_scenario_") {
            prefix = "[global]";
            cls    = "sc-log-source-global";
        } else {
            const nameEl = document.getElementById(`name_${serial}`);
            const name   = nameEl ? nameEl.innerText : serial;
            prefix = `[board:${name}]`;
            cls    = stream === "error" ? "sc-log-source-error" : "sc-log-source-board";
        }

        const frag = document.createDocumentFragment();
        lines.forEach((line, i) => {
            const div = document.createElement("div");
            if (i === 0) {
                div.innerHTML = `<span class="${cls}">${esc(prefix)}</span> ${esc(line)}`;
            } else {
                div.innerHTML = `<span class="sc-log-indent"></span>${esc(line)}`;
            }
            frag.appendChild(div);
        });
        log.appendChild(frag);
        log.scrollTop = log.scrollHeight;
    });

    sc.on("run_board_nickname", ({ serial, nickname }) => {
        // Backend can emit this to update display name
        const nameEl = document.getElementById(`name_${serial}`);
        if (nameEl) nameEl.innerText = nickname;
    });

    sc.on("run_done", ({ run_id: rid }) => {
        if (rid !== run_id) return;
        if (badge) { badge.innerText = "done"; }
    });
}

function closeRunPanel() {
    document.getElementById("scRunPanel").style.display = "none";
    const sc = getSocket();
    sc.off("run_board_status");
    sc.off("run_output");
    sc.off("run_board_nickname");
    sc.off("run_done");
}

function renderYaml(text, issueLines = new Set()) {
    const wrap  = document.getElementById("scYamlView");
    const lines = text.split("\n");
    const html  = lines.map((line, idx) => {
        const lineNum  = idx + 1;
        const hasIssue = issueLines.has(lineNum);
        const rendered = highlightLine(line);
        if (hasIssue) {
            return `<mark class="sc-line-error">${rendered}</mark>`;
        }
        return rendered;
    });
    wrap.innerHTML = `<pre class="sc-yaml-content">${html.join("\n")}</pre>`;
}

function highlightLine(line) {
    if (/^\s*#/.test(line)) return `<span class="sc-yaml-comment">${esc(line)}</span>`;
    if (/^\s*-\s/.test(line))
        return line.replace(/^(\s*-\s*)(.*)$/, (_, dash, rest) =>
            `<span class="sc-yaml-dash">${esc(dash)}</span>${highlightKeyVal(rest)}`);
    return highlightKeyVal(line);
}

function highlightKeyVal(line) {
    return line.replace(/^(\s*)([^:]+)(:)(\s*.*)$/, (_, indent, key, colon, val) =>
        `${esc(indent)}<span class="sc-yaml-key">${esc(key)}</span>${esc(colon)}<span class="sc-yaml-value">${esc(val)}</span>`);
}

function esc(s) {
    if (s == null) return "";
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function appendBoard() {

    const jlink   = document.getElementById("bfJlink").value.trim();
    const masserase  = document.getElementById("bfMasserase").checked;
    const haltReset  = document.getElementById("bfHaltReset").checked;
    const openTerm   = document.getElementById("bfOpenTerm").checked;
    const script  = document.getElementById("bfScript").value.trim();

    if (!board && !jlink) { alert("Please fill at least Board ID or JLink/IP"); return; }

    const s37Lines = bfS37Files.length > 0
        ? bfS37Files.map(f => `      - ${f}`).join("\n")
        : "      - .s37";

    const block = [
        "  - board: " + board,
        "    jlink_name_or_ip: " + jlink,
        "    masserase: " + masserase,
        "    halt_reset: " + haltReset,
        "    open_terminal: " + openTerm,
        "    s37_files:",
        s37Lines,
        '    script: "' + script + '"',
    ].join("\n");

    const editor = document.getElementById("scYamlEditor");
    const current = editor.value.trimEnd();

    // If editor is empty or just template header, start fresh
    if (!current || current === YAML_TEMPLATE.trimEnd()) {
        editor.value = "boards:\n" + block + "\n";
    } else {
        editor.value = current + "\n" + block + "\n";
    }

    document.getElementById("scCheckBtn").disabled = false;
    closeBoardForm();
}

// Close overlay on background click
document.getElementById("boardFormOverlay").addEventListener("click", e => {
    if (e.target === document.getElementById("boardFormOverlay")) closeBoardForm();
});

</script>
