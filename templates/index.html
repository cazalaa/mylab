<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>My Lab</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="/static/socket.io.min.js"></script> 
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
<script> window._appSocket = io(); </script>
</head>
<body>

<!-- ── topbar (always visible) ── -->
<div class="topbar" id="topbar">
    <div class="progress-wrap" id="progressWrap">
        <span class="progress-label" id="progressLabel"></span>
        <div class="progress-track">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>
    <div class="topbar-actions">
        <button id="btnMaintenance" onclick="togglePage('maintenance')" data-icon="Maintenance">Maintenance</button>
        <button id="btnManualControl" onclick="togglePage('manual_control')" data-icon="Manual Control">Manual Control</button>
        <button id="btnScriptControl" onclick="togglePage('script_control')" data-icon="Scenario Control">Scenario Control</button>
    </div>
</div>

<!-- ── expandable content (filled dynamically) ── -->
<div class="content-wrap" id="contentWrap"></div>

<script>
let activePage = null;

window.appState = {
    selected: new Set(),
    cache: []
};
async function refreshCache() {
    const res = await fetch('/adapters');
    window.appState.cache = await res.json();
}
const loadedPages = new Set();

async function togglePage(name) {
    const wrap   = document.getElementById("contentWrap");
    const topbar = document.getElementById("topbar");

    if (activePage === name) {
        activePage = null;
        document.getElementById(`page-${name}`).style.display = "none";
        wrap.classList.remove("expanded");
        topbar.classList.remove("expanded");
        document.querySelectorAll(".topbar-actions button").forEach(b => b.classList.remove("open"));
        if (window.pywebview) window.pywebview.api.set_height(82);
        return;
    }

    // Cacher la page courante
    if (activePage) {
        document.getElementById(`page-${activePage}`).style.display = "none";
    }

    if (!loadedPages.has(name)) {
        // Première fois — charger et injecter
        await refreshCache();
        const res  = await fetch(`/page/${name}`);
        const html = await res.text();

        const div = document.createElement("div");
        div.id = `page-${name}`;
        wrap.appendChild(div);
        div.innerHTML = html;

        div.querySelectorAll("script").forEach(old => {
            const s = document.createElement("script");
            s.textContent = old.textContent;
            document.body.appendChild(s);
            old.remove();
        });

        div.querySelectorAll("style").forEach(old => {
            const s = document.createElement("style");
            s.textContent = old.textContent;
            document.head.appendChild(s);
            old.remove();
        });

        loadedPages.add(name);
        if (typeof onPageLoad === "function") onPageLoad();

    } else {
        // Déjà chargée — montrer et rafraîchir
        document.getElementById(`page-${name}`).style.display = "";
        await refreshCache();
        if (typeof onPageLoad === "function") onPageLoad();
    }

    activePage = name;
    wrap.classList.add("expanded");
    topbar.classList.add("expanded");

    document.querySelectorAll(".topbar-actions button").forEach(b => b.classList.remove("open"));
    const btnId = "btn" + name.split("_").map(w => w.charAt(0).toUpperCase() + w.slice(1)).join("");
    const btnEl = document.getElementById(btnId);
    if (btnEl) btnEl.classList.add("open");

    if (window.pywebview) window.pywebview.api.set_height(700);
}
</script>
</body>
</html>
